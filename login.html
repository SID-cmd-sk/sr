<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SR Platform — Sign In</title>
<link rel="icon" href="data:,"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0 }
:root {
  --bg:      #070B14;
  --card:    #0F1623;
  --border:  rgba(255,255,255,0.07);
  --accent:  #3B82F6;
  --teal:    #14B8A6;
  --text-1:  #F0F4FF;
  --text-2:  #8B95B0;
  --text-3:  #4A5268;
  --red:     #EF4444;
  --green:   #10B981;
  --font:    'Plus Jakarta Sans', system-ui, sans-serif;
  --r:       8px;
  --r-lg:    14px;
  --r-xl:    18px;
  --ease:    cubic-bezier(0.16, 1, 0.3, 1);
}
html { font-size: 14px }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-1);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 60% at 15% 25%, rgba(59,130,246,0.07) 0%, transparent 65%),
    radial-gradient(ellipse 50% 70% at 85% 75%, rgba(20,184,166,0.05) 0%, transparent 65%),
    radial-gradient(ellipse 40% 40% at 50% 90%, rgba(139,92,246,0.04) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
  background-size: 64px 64px;
  pointer-events: none;
  z-index: 0;
}

.noise {
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1;
  opacity: 0.5;
}

.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
  animation: float 8s ease-in-out infinite;
}
.orb-1 {
  width: 400px; height: 400px;
  background: rgba(59,130,246,0.06);
  top: -100px; left: -100px;
  animation-delay: 0s;
}
.orb-2 {
  width: 300px; height: 300px;
  background: rgba(20,184,166,0.05);
  bottom: -80px; right: -80px;
  animation-delay: -4s;
}
@keyframes float {
  0%, 100% { transform: translate(0,0) scale(1) }
  33%       { transform: translate(20px,-20px) scale(1.05) }
  66%       { transform: translate(-10px,15px) scale(0.97) }
}

.wrap {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 400px;
  animation: slideUp 0.5s var(--ease) both;
}
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px) }
  to   { opacity: 1; transform: translateY(0) }
}

.brand {
  text-align: center;
  margin-bottom: 36px;
}
.brand-logo {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 58px;
  height: 58px;
  border-radius: 17px;
  background: linear-gradient(135deg, #3B82F6, #14B8A6);
  margin-bottom: 18px;
  box-shadow:
    0 0 0 1px rgba(59,130,246,0.3),
    0 0 40px rgba(59,130,246,0.2),
    0 16px 32px rgba(0,0,0,0.4);
  position: relative;
}
.brand-logo::after {
  content: '';
  position: absolute;
  inset: 1px;
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
  pointer-events: none;
}
.brand-name {
  font-size: 1.6rem;
  font-weight: 800;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, #F0F4FF 30%, #8B95B0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  display: block;
}
.brand-sub {
  font-size: 0.68rem;
  color: var(--text-3);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 5px;
  display: block;
}

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 30px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.03) inset,
    0 24px 64px rgba(0,0,0,0.5),
    0 4px 16px rgba(0,0,0,0.3);
  backdrop-filter: blur(16px);
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
}
.card-title {
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 22px;
  color: var(--text-1);
}

.form-group { margin-bottom: 14px }
.label {
  display: block;
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-2);
  margin-bottom: 6px;
}
.input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--r);
  color: var(--text-1);
  font-family: var(--font);
  font-size: 0.875rem;
  padding: 10px 13px;
  outline: none;
  transition: border-color 180ms var(--ease), box-shadow 180ms var(--ease), background 180ms;
  -webkit-appearance: none;
}
.input::placeholder { color: var(--text-3) }
.input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
  background: rgba(59,130,246,0.04);
}
.input:focus::placeholder { color: var(--text-3); opacity: 0.6 }

.input-wrap { position: relative }
.input-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-3);
  pointer-events: none;
  transition: color 180ms;
}
.input-wrap:focus-within .input-icon { color: var(--accent) }
.input-wrap .input { padding-left: 38px }

.err {
  background: rgba(239,68,68,0.08);
  border: 1px solid rgba(239,68,68,0.2);
  color: var(--red);
  border-radius: var(--r);
  padding: 10px 13px;
  font-size: 0.8rem;
  margin-bottom: 16px;
  display: none;
  line-height: 1.5;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 11px;
  margin-top: 6px;
  border-radius: var(--r);
  background: linear-gradient(135deg, #3B82F6, #2563EB);
  color: #fff;
  font-family: var(--font);
  font-size: 0.9rem;
  font-weight: 700;
  border: none;
  cursor: pointer;
  transition: all 200ms var(--ease);
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 16px rgba(59,130,246,0.3), 0 2px 4px rgba(0,0,0,0.2);
}
.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
  pointer-events: none;
}
.btn:hover:not(:disabled) {
  background: linear-gradient(135deg, #2563EB, #1D4ED8);
  box-shadow: 0 6px 24px rgba(59,130,246,0.4), 0 2px 4px rgba(0,0,0,0.2);
  transform: translateY(-1px);
}
.btn:active:not(:disabled) { transform: scale(0.98); box-shadow: 0 2px 8px rgba(59,130,246,0.25) }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none }
.btn.loading .btn-text { display: none }
.btn:not(.loading) .btn-spinner { display: none }
.btn-spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.65s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg) } }

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0 4px;
}
.divider-line { flex: 1; height: 1px; background: rgba(255,255,255,0.06) }
.divider-text { font-size: 0.7rem; color: var(--text-3) }

.footer {
  text-align: center;
  margin-top: 22px;
  font-size: 0.7rem;
  color: var(--text-3);
  line-height: 1.7;
}

.version-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  background: rgba(59,130,246,0.08);
  border: 1px solid rgba(59,130,246,0.15);
  border-radius: 20px;
  font-size: 0.63rem;
  color: #60A5FA;
  font-weight: 600;
  letter-spacing: 0.04em;
  margin-top: 8px;
}
.version-dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
}
</style>
</head>
<body>
<div class="noise"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="wrap">
  <div class="brand">
    <div class="brand-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
        <path d="M9 12l2 2 4-4M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="brand-name">SR Platform</span>
    <span class="brand-sub">Internal Workflow System · SKS 3D</span>
  </div>

  <div class="card">
    <h2 class="card-title">Welcome back</h2>

    <div class="err" id="err"></div>

    <div class="form-group">
      <label class="label" for="email">Email Address</label>
      <div class="input-wrap">
        <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        <input class="input" type="email" id="email" placeholder="you@sks3d.com" autocomplete="email"/>
      </div>
    </div>

    <div class="form-group">
      <label class="label" for="pass">Password</label>
      <div class="input-wrap">
        <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        <input class="input" type="password" id="pass" placeholder="••••••••" autocomplete="current-password"/>
      </div>
    </div>

    <button class="btn" id="btn" onclick="doLogin()">
      <div class="btn-spinner"></div>
      <span class="btn-text">Sign In</span>
    </button>
  </div>

  <div class="footer">
    Internal use only · Contact Admin for access
    <br/>
    <div class="version-badge">
      <span class="version-dot"></span>
      SR Platform v2.0
    </div>
  </div>
</div>

<script>
'use strict'
let sb = null

async function initSupabase() {
  try {
    if (!window.APP_CONFIG) throw new Error('Missing config.js')
    const { SUPABASE_URL, SUPABASE_ANON } = window.APP_CONFIG
    if (!SUPABASE_URL || !SUPABASE_ANON) throw new Error('Missing Supabase config')
    const { createClient } = supabase
    sb = createClient(SUPABASE_URL, SUPABASE_ANON, {
      auth: { persistSession:true, autoRefreshToken:true, detectSessionInUrl:true }
    })
  } catch(e) {
    document.body.innerHTML = `<div style="color:#EF4444;padding:40px;text-align:center;font-family:sans-serif">
      <strong>Configuration Error</strong><br/><small>${e.message}</small>
    </div>`
  }
}

function withTimeout(p, ms, msg) {
  let t
  const to = new Promise((_,r) => { t = setTimeout(() => r(new Error(msg)), ms) })
  return Promise.race([p, to]).finally(() => clearTimeout(t))
}

async function checkExistingSession() {
  try {
    if (!sb) return
    const { data } = await withTimeout(sb.auth.getSession(), 5000, 'Session check timeout')
    if (data.session) window.location.href = 'app.html'
  } catch(e) {}
}

window.addEventListener('load', async () => {
  await initSupabase()
  await checkExistingSession()
  setTimeout(() => document.getElementById('email')?.focus(), 100)
})

async function doLogin() {
  const email = document.getElementById('email').value.trim()
  const pass  = document.getElementById('pass').value
  const btn   = document.getElementById('btn')
  const err   = document.getElementById('err')

  err.style.display = 'none'

  if (!email || !pass) {
    showErr('Please enter your email and password.')
    return
  }
  if (!email.includes('@')) {
    showErr('Please enter a valid email address.')
    return
  }
  if (pass.length < 6) {
    showErr('Password must be at least 6 characters.')
    return
  }

  btn.disabled = true
  btn.classList.add('loading')

  try {
    if (!sb) throw new Error('Authentication not initialized. Please refresh.')
    const { error } = await withTimeout(
      sb.auth.signInWithPassword({ email, password: pass }),
      30000,
      'Sign in timed out. Check your connection and try again.'
    )
    if (error) throw error
    window.location.href = 'app.html'
  } catch(e) {
    btn.disabled = false
    btn.classList.remove('loading')
    showErr(e.message.toLowerCase().includes('invalid') ? 'Invalid email or password.' : e.message)
  }
}

function showErr(msg) {
  const e = document.getElementById('err')
  e.textContent = msg
  e.style.display = 'block'
  e.style.animation = 'none'
  requestAnimationFrame(() => {
    e.style.animation = 'shake 0.4s ease'
  })
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin()
})

const style = document.createElement('style')
style.textContent = `
@keyframes shake {
  0%,100% { transform: translateX(0) }
  20%      { transform: translateX(-6px) }
  40%      { transform: translateX(6px) }
  60%      { transform: translateX(-4px) }
  80%      { transform: translateX(4px) }
}
`
document.head.appendChild(style)
</script>
</body>
</html>
