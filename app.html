<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SR Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>

:root{
  --bg:#0A0C12;--bg-surface:#0E1118;--bg-elevated:#141820;--bg-card:#181D27;--bg-hover:#1E2430;
  --border:#1E2535;--border-light:#252D3D;
  --text-primary:#E8EAF0;--text-secondary:#8B92A5;--text-muted:#4B5268;--text-inverse:#0A0C12;
  --accent:#00D4AA;--accent-dim:rgba(0,212,170,.12);--accent-hover:#00B894;
  --green:#00D4AA;--yellow:#D4A800;--red:#E05555;--red-crit:#FF2D2D;
  --blue:#3B9EFF;--purple:#8B5CF6;--orange:#F97316;
  --font-display:'Syne',system-ui,sans-serif;--font-body:'Syne',system-ui,sans-serif;--font-mono:'Geist Mono','Courier New',monospace;
  --radius-sm:4px;--radius:8px;--radius-lg:12px;--radius-xl:16px;
  --sidebar-w:220px;--header-h:56px;--transition:150ms cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:var(--font-body);background:var(--bg);color:var(--text-primary);line-height:1.5;-webkit-font-smoothing:antialiased;min-height:100vh}
::selection{background:var(--accent);color:var(--text-inverse)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:2px}
h1{font-size:1.75rem;font-weight:700;letter-spacing:-.02em}
h2{font-size:1.375rem;font-weight:600;letter-spacing:-.01em}
h3{font-size:1.1rem;font-weight:600}
h4{font-size:.95rem;font-weight:600}
a{color:inherit;text-decoration:none}

/* Layout */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;position:relative}
#auth-screen::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:48px 48px;opacity:.35;pointer-events:none}
.app-shell{display:flex;height:100vh;overflow:hidden}
.app-sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--bg-surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden}
.app-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.app-header{height:var(--header-h);flex-shrink:0;background:var(--bg-surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px}
.page-content{flex:1;overflow-y:auto;padding:20px}

/* Sidebar */
.sidebar-logo{padding:16px 16px 12px;border-bottom:1px solid var(--border)}
.sidebar-logo-text{font-family:var(--font-display);font-weight:800;font-size:1.1rem;color:var(--accent);letter-spacing:-.02em}
.sidebar-logo-sub{font-size:.65rem;color:var(--text-muted);letter-spacing:.12em;text-transform:uppercase;margin-top:1px}
.sidebar-section{padding:12px 8px 4px}
.sidebar-section-label{font-size:.62rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);padding:0 8px;margin-bottom:4px}
.sidebar-link{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:var(--radius);color:var(--text-secondary);font-size:.875rem;font-weight:500;transition:all var(--transition);cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:var(--font-body)}
.sidebar-link:hover{background:var(--bg-hover);color:var(--text-primary)}
.sidebar-link.active{background:var(--accent-dim);color:var(--accent)}
.sidebar-footer{margin-top:auto;padding:12px 8px;border-top:1px solid var(--border)}

/* Cards */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.card-sm{padding:12px}.card-lg{padding:24px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px;display:flex;flex-direction:column;gap:4px;position:relative;overflow:hidden;transition:border-color var(--transition)}
.stat-card:hover{border-color:var(--border-light)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ac,var(--accent))}
.stat-value{font-family:var(--font-display);font-size:2rem;font-weight:800;color:var(--ac,var(--accent));line-height:1;letter-spacing:-.03em}
.stat-label{font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)}

/* Table */
.data-table{width:100%;border-collapse:collapse;font-size:.875rem}
.data-table th{text-align:left;font-size:.65rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);padding:8px 12px;border-bottom:1px solid var(--border);white-space:nowrap}
.data-table td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text-primary);vertical-align:middle}
.data-table tbody tr{transition:background var(--transition);cursor:pointer}
.data-table tbody tr:hover{background:var(--bg-hover)}
.data-table tbody tr:last-child td{border-bottom:none}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:.7rem;font-weight:600;letter-spacing:.04em;white-space:nowrap}
.badge-dot{width:5px;height:5px;border-radius:50%;background:currentColor;flex-shrink:0}
.badge-low{background:rgba(107,114,128,.15);color:#9CA3AF}
.badge-medium{background:rgba(212,168,0,.15);color:#D4A800}
.badge-high{background:rgba(224,85,85,.15);color:#E05555}
.badge-critical{background:rgba(255,45,45,.2);color:#FF6B6B;border:1px solid rgba(255,45,45,.3)}
.badge-open{background:rgba(59,158,255,.15);color:#3B9EFF}
.badge-in-progress{background:rgba(0,212,170,.15);color:#00D4AA}
.badge-pending{background:rgba(212,168,0,.15);color:#D4A800}
.badge-closed{background:rgba(107,114,128,.15);color:#9CA3AF}
.badge-archived{background:rgba(55,65,81,.3);color:#6B7280}
.badge-admin{background:rgba(139,92,246,.15);color:#A78BFA}
.badge-manager{background:rgba(0,212,170,.15);color:#00D4AA}
.badge-technical{background:rgba(59,158,255,.15);color:#3B9EFF}
.badge-user{background:rgba(232,234,240,.08);color:var(--text-secondary)}
.badge-viewer{background:rgba(55,65,81,.3);color:#6B7280}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--radius);font-size:.875rem;font-weight:600;font-family:var(--font-body);cursor:pointer;border:1px solid transparent;transition:all var(--transition);white-space:nowrap;text-decoration:none}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--accent);color:var(--text-inverse);border-color:var(--accent)}
.btn-primary:hover:not(:disabled){background:var(--accent-hover);border-color:var(--accent-hover)}
.btn-secondary{background:var(--bg-elevated);color:var(--text-primary);border-color:var(--border-light)}
.btn-secondary:hover:not(:disabled){background:var(--bg-hover)}
.btn-ghost{background:transparent;color:var(--text-secondary);border-color:transparent}
.btn-ghost:hover:not(:disabled){background:var(--bg-hover);color:var(--text-primary)}
.btn-danger{background:rgba(224,85,85,.1);color:var(--red);border-color:rgba(224,85,85,.25)}
.btn-danger:hover:not(:disabled){background:rgba(224,85,85,.2)}
.btn-sm{padding:4px 10px;font-size:.8rem}
.btn-lg{padding:10px 20px;font-size:1rem}

/* Forms */
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:.75rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-secondary)}
.form-label.req::after{content:' *';color:var(--red)}
.form-input,.form-select,.form-textarea{background:var(--bg-elevated);border:1px solid var(--border-light);border-radius:var(--radius);padding:8px 12px;font-size:.875rem;font-family:var(--font-body);color:var(--text-primary);width:100%;transition:border-color var(--transition),box-shadow var(--transition);outline:none;-webkit-appearance:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
.form-input::placeholder{color:var(--text-muted)}
.form-textarea{resize:vertical;min-height:90px;line-height:1.5}
.form-select{cursor:pointer}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-hint{font-size:.75rem;color:var(--text-muted);margin-top:2px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn 150ms ease}
.modal{background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius-xl);width:100%;max-width:600px;max-height:90vh;overflow-y:auto;animation:slideUp 200ms cubic-bezier(.34,1.56,.64,1)}
.modal-lg{max-width:800px}.modal-sm{max-width:420px}
.modal-header{padding:20px 24px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.modal-title{font-size:1.1rem;font-weight:700}
.modal-body{padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* Page header */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px}
.page-title{font-size:1.375rem;font-weight:700;letter-spacing:-.01em}
.page-subtitle{font-size:.8rem;color:var(--text-secondary);margin-top:2px}

/* Filter bar */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}
.search-wrap input{padding-left:32px}

/* Tabs */
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px}
.tab-btn{padding:8px 16px;font-size:.875rem;font-weight:500;color:var(--text-secondary);background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;transition:all var(--transition);font-family:var(--font-body)}
.tab-btn:hover{color:var(--text-primary)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Alerts */
.alert{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:var(--radius);font-size:.875rem;border:1px solid transparent;margin-bottom:12px}
.alert-success{background:rgba(0,212,170,.1);border-color:rgba(0,212,170,.2);color:var(--green)}
.alert-error{background:rgba(224,85,85,.1);border-color:rgba(224,85,85,.2);color:var(--red)}
.alert-warning{background:rgba(212,168,0,.1);border-color:rgba(212,168,0,.2);color:var(--yellow)}
.alert-info{background:rgba(59,158,255,.1);border-color:rgba(59,158,255,.2);color:var(--blue)}

/* Empty state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 20px;text-align:center}
.empty-icon{width:48px;height:48px;border-radius:var(--radius-lg);background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;color:var(--text-muted)}
.empty-title{font-weight:600;color:var(--text-secondary)}
.empty-desc{font-size:.8rem;color:var(--text-muted);max-width:280px}

/* Route progress */
.route-step-dot{width:24px;height:24px;border-radius:50%;border:2px solid var(--border-light);background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:var(--text-muted);flex-shrink:0}
.route-step-dot.done{background:var(--accent);border-color:var(--accent);color:var(--text-inverse)}
.route-step-dot.current{border-color:var(--accent);color:var(--accent);box-shadow:0 0 0 4px var(--accent-dim)}
.route-connector{height:2px;flex:1;background:var(--border);min-width:20px}
.route-connector.done{background:var(--accent)}

/* Utilities */
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}
.justify-between{justify-content:space-between}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.flex-1{flex:1}.w-full{width:100%}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px}
.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}.mb-5{margin-bottom:20px}
.mt-auto{margin-top:auto}.ml-auto{margin-left:auto}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hidden{display:none!important}
.text-accent{color:var(--accent)}.text-muted{color:var(--text-muted)}.text-red{color:var(--red)}.text-green{color:var(--green)}
.mono{font-family:var(--font-mono)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-600px 0}100%{background-position:600px 0}}
.spinner{width:14px;height:14px;border:2px solid rgba(0,0,0,.25);border-top-color:var(--text-inverse);border-radius:50%;animation:spin .7s linear infinite;display:inline-block}

/* Sidebar icon sizing - was missing, caused broken layout */
.icon{width:15px;height:15px;flex-shrink:0;stroke-width:1.75}

/* Skeleton shimmer loader */
.sk{background:linear-gradient(90deg,var(--bg-elevated) 25%,var(--bg-hover) 50%,var(--bg-elevated) 75%);background-size:600px 100%;animation:shimmer 1.5s ease infinite;border-radius:var(--radius)}
.sk-h{height:26px;margin-bottom:4px}.sk-sm{height:14px}.sk-btn{height:34px;width:90px}
.sk-stat{height:76px;border-radius:var(--radius-lg)}
.sk-row{height:42px;margin-bottom:3px;border-radius:4px}
.sk-card{height:120px;border-radius:var(--radius-lg)}
.sk-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:16px;margin-bottom:20px}

/* Toast container */
#toast-root{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{pointer-events:all;display:flex;align-items:center;gap:10px;padding:12px 18px;border-radius:var(--radius-lg);font-size:.85rem;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.5);animation:slideUp .2s ease;border:1px solid transparent;min-width:240px}
.toast-success{background:#0d2420;border-color:rgba(0,212,170,.3);color:#00D4AA}
.toast-error{background:#200d0d;border-color:rgba(224,85,85,.3);color:#E05555}
.toast-info{background:#0d1520;border-color:rgba(59,158,255,.3);color:#3B9EFF}

/* Page error state */
.page-error{display:flex;flex-direction:column;align-items:center;gap:14px;padding:60px 20px;text-align:center}
.page-error svg{opacity:.4}
.page-error-title{font-size:1rem;font-weight:700}
.page-error-msg{font-size:.82rem;color:var(--text-muted);max-width:360px;line-height:1.6}

/* Sidebar active indicator */
.sidebar-link.active{background:var(--accent-dim);color:var(--accent);box-shadow:inset 3px 0 0 var(--accent)}

/* Header breadcrumb path */
.breadcrumb-path{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--text-muted)}
.breadcrumb-path span{color:var(--text-primary);font-weight:500}
</style>
</head>
<body>
<!-- ═══════════════════════════════════════════════════════════
  AUTH SCREEN
════════════════════════════════════════════════════════════ -->
<div id="auth-screen">
  <div style="position:relative;z-index:1;width:100%;max-width:380px;animation:slideUp .4s ease">
    <div style="text-align:center;margin-bottom:32px">
      <div style="display:inline-flex;align-items:center;justify-content:center;width:52px;height:52px;border-radius:14px;background:var(--accent);margin-bottom:14px;box-shadow:0 0 32px rgba(0,212,170,.2)">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none"><path d="M9 12l2 2 4-4M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke="#0A0C12" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div style="font-weight:800;font-size:1.45rem;letter-spacing:-.03em">SR Platform</div>
      <div style="font-size:.7rem;color:var(--text-muted);letter-spacing:.12em;text-transform:uppercase;margin-top:4px">Internal Workflow System</div>
    </div>
    <div class="card card-lg">
      <h3 style="margin-bottom:20px">Sign in to your account</h3>
      <div id="login-error" class="alert alert-error hidden"></div>
      <div class="form-group mb-3">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" id="login-email" placeholder="you@sks3d.com" autocomplete="email"/>
      </div>
      <div class="form-group" style="margin-bottom:16px">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password"/>
      </div>
      <button class="btn btn-primary w-full" id="login-btn" onclick="doLogin()" style="justify-content:center">Sign In</button>
    </div>
    <p style="text-align:center;margin-top:20px;font-size:.72rem;color:var(--text-muted)">Internal use only · Contact Admin for access</p>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
  APP SHELL
════════════════════════════════════════════════════════════ -->
<div id="app-shell" class="app-shell hidden">

  <!-- Sidebar -->
  <aside class="app-sidebar">
    <div class="sidebar-logo">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:28px;height:28px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 12l2 2 4-4M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke="#0A0C12" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div>
          <div class="sidebar-logo-text">SR Platform</div>
          <div class="sidebar-logo-sub">SKS 3D · Internal</div>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Main</div>
      <button class="sidebar-link" onclick="nav('dashboard')">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </button>
      <button class="sidebar-link" onclick="nav('sr')">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/></svg>
        Service Requests
      </button>
      <button class="sidebar-link" onclick="nav('activities')">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Activities
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Manage</div>
      <button class="sidebar-link" onclick="nav('routes')">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        Routes
      </button>
      <button class="sidebar-link" onclick="nav('templates')">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Templates
      </button>
      <button class="sidebar-link" onclick="nav('whatsapp')">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
        WhatsApp
      </button>
    </div>

    <div class="sidebar-section" id="admin-section">
      <div class="sidebar-section-label">Admin</div>
      <button class="sidebar-link" onclick="nav('users')">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Users
      </button>
      <button class="sidebar-link" onclick="nav('reports')">

async function doLogin() {

  const pass  = document.getElementById('login-pass').value

  const err   = document.getElementById('login-error')

function nav(page, params={}) {
  const h = params && Object.keys(params).length
    ? '#' + page + '?' + new URLSearchParams(params).toString()
    : '#' + page
  window.location.hash = h
}

function routeFromHash() {
  if (!ME) return
  const hash   = window.location.hash.slice(1) || 'dashboard'
  const [page, qs] = hash.split('?')
  const params = Object.fromEntries(new URLSearchParams(qs || ''))

  // Highlight active sidebar link
  document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active'))
  document.querySelectorAll('.sidebar-link').forEach(l => {
    if (l.getAttribute('onclick')?.includes(`'${page}'`)) l.classList.add('active')
  })

  document.getElementById('breadcrumb').textContent = {
    dashboard:'Dashboard', sr:'Service Requests', 'sr-new':'New SR',
    'sr-detail':'SR Detail', 'sr-edit':'Edit SR', activities:'Activities',
    routes:'Routes', templates:'Templates', whatsapp:'WhatsApp',
    users:'Users', reports:'Reports', settings:'Settings',
  }[page] ?? page

  const pc = document.getElementById('page-content')
  pc.innerHTML = '<div style="color:var(--text-muted);padding:40px;text-align:center">Loading…</div>'

  const pages = { dashboard:pgDashboard, sr:pgSR, 'sr-new':pgSRNew, 'sr-detail':pgSRDetail,
    'sr-edit':pgSREdit, activities:pgActivities, routes:pgRoutes, templates:pgTemplates,
    whatsapp:pgWhatsApp, users:pgUsers, reports:pgReports, settings:pgSettings }

  if (pages[page]) pages[page](pc, params)
  else pgDashboard(pc, params)
}

const fmtDate = iso => iso ? new Date(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) : '—'
const fmtDateS = iso => iso ? new Date(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'2-digit'}) : '—'
const greeting = () => { const h=new Date().getHours(); return h<12?'morning':h<17?'afternoon':'evening' }

const PRIORITY_CLS = {Low:'badge-low',Medium:'badge-medium',High:'badge-high',Critical:'badge-critical'}
const STATUS_CLS   = {'Open':'badge-open','In Progress':'badge-in-progress','Pending':'badge-pending','Closed':'badge-closed','Archived':'badge-archived'}
const ROLE_CLS     = {Admin:'badge-admin',Manager:'badge-manager',Technical:'badge-technical',User:'badge-user',Viewer:'badge-viewer'}

function priBadge(p) { return `<span class="badge ${PRIORITY_CLS[p]||'badge-low'}"><span class="badge-dot"></span>${p}</span>` }
function stsBadge(s) { return `<span class="badge ${STATUS_CLS[s]||'badge-closed'}">${s}</span>` }
function roleBadge(r){ return `<span class="badge ${ROLE_CLS[r]||'badge-user'}">${r}</span>` }

function toast(msg, type='success') {
  const root = document.getElementById('toast-root')
  const t = document.createElement('div')
  t.className = `toast toast-${type}`
  const icon = type==='success'?'✓':type==='error'?'✕':'ℹ'
  t.innerHTML = `<span style="font-size:.9rem">${icon}</span><span>${msg}</span>`
  root.appendChild(t)
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300) }, 3500)
}

function skeletonPage(hasBtn=true) {
  return `<div class="skel-page">

      ${statCard('Closed', s.closed_sr, 'var(--text-muted)')}
      ${statCard('Critical Open', s.critical_open, 'var(--red)')}
      ${statCard('Overdue 48h', overdueCount??0, 'var(--orange)')}

function statCard(label, value, color) {

function emptyState(title, desc) {

}

// ═══════════════════════════════════════════════════════════
// PAGE: SR LIST
// ═══════════════════════════════════════════════════════════
async function pgSR(pc, params={}) {
  pc.innerHTML = skeletonPage()
  try {
  const q    = params.q ?? ''
  const sts  = params.status ?? ''
  const pri  = params.priority ?? ''
  const page = parseInt(params.page ?? '1')
  const ps   = 25

  let query = sb.from('sr_list').select('*', {count:'exact'})
  if (sts) query = query.eq('status', sts)
  if (pri) query = query.eq('priority', pri)
  if (q)   query = query.or(`sr_number.ilike.%${q}%,title.ilike.%${q}%,account.ilike.%${q}%,customer_name.ilike.%${q}%`)
  if (!['Admin','Manager'].includes(ME?.role)) query = query.eq('owner_id', ME?.id)

  const { data: srs, count } = await query.order('created_at',{ascending:false}).range((page-1)*ps, page*ps-1)
  const totalPages = Math.ceil((count??0)/ps)

  pc.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Service Requests</div><div class="page-subtitle">${count??0} total records</div></div>
      ${ME?.role !== 'Viewer' ? `<button class="btn btn-primary" onclick="nav('sr-new')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>New SR</button>` : ''}
    </div>
    <div class="filter-bar">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input class="form-input" id="sr-q" value="${q}" placeholder="Search SR#, title, account…"/>
      </div>
      <select class="form-select" id="sr-sts" style="width:auto">
        <option value="">All Status</option>
        ${STATUSES.map(s=>`<option value="${s}" ${s===sts?'selected':''}>${s}</option>`).join('')}
      </select>
      <select class="form-select" id="sr-pri" style="width:auto">
        <option value="">All Priority</option>
        ${PRIORITIES.map(p=>`<option value="${p}" ${p===pri?'selected':''}>${p}</option>`).join('')}
      </select>
      <button class="btn btn-secondary" onclick="srFilter()">Filter</button>
      <button class="btn btn-ghost" onclick="nav('sr')">Clear</button>
    </div>
    <div class="card" style="padding:0">
      ${!srs?.length ? emptyState('No service requests found','Try adjusting your filters or create a new SR') :
      `<table class="data-table"><thead><tr>
        <th>SR #</th><th>Title</th><th>Account</th><th>Issue Type</th><th>Priority</th><th>Status</th><th>Owner</th><th>Reported</th><th>Updated</th>
      </tr></thead><tbody>
      ${srs.map(sr=>`<tr onclick="nav('sr-detail',{id:'${sr.id}'})">
        <td><span class="mono text-accent" style="font-size:.75rem;font-weight:600">${sr.sr_number}</span></td>
        <td class="truncate" style="max-width:200px">${escHtml(sr.title)}</td>
        <td style="color:var(--text-secondary);font-size:.8rem">${escHtml(sr.account??'—')}</td>
        <td style="color:var(--text-secondary);font-size:.8rem">${escHtml(sr.issue_type??'—')}</td>
        <td>${priBadge(sr.priority)}</td>
        <td>${stsBadge(sr.status)}</td>
        <td style="font-size:.8rem"><div style="font-weight:500">${escHtml(sr.owner_name??'—')}</div></td>
        <td class="mono" style="font-size:.7rem;color:var(--text-muted)">${fmtDateS(sr.reported_at)}</td>
        <td class="mono" style="font-size:.7rem;color:var(--text-muted)">${fmtDateS(sr.updated_at)}</td>
      </tr>`).join('')}
      </tbody></table>`}
    </div>
    ${totalPages>1 ? `<div class="flex items-center gap-2" style="justify-content:center;margin-top:16px">
      ${page>1 ? `<button class="btn btn-secondary btn-sm" onclick="nav('sr',{q:'${q}',status:'${sts}',priority:'${pri}',page:${page-1}})">← Prev</button>` : ''}
      <span style="font-size:.8rem;color:var(--text-secondary)">Page ${page} of ${totalPages}</span>
      ${page<totalPages ? `<button class="btn btn-secondary btn-sm" onclick="nav('sr',{q:'${q}',status:'${sts}',priority:'${pri}',page:${page+1}})">Next →</button>` : ''}
    </div>` : ''}`
}

  } catch(e) {
    console.error('SR list error:', e)
    pc.innerHTML = pageError('Could not load service requests', e.message, true, 'sr')
  }
}

function srFilter() {
  const q   = document.getElementById('sr-q')?.value ?? ''
  const sts = document.getElementById('sr-sts')?.value ?? ''
  const pri = document.getElementById('sr-pri')?.value ?? ''
  nav('sr', {q, status:sts, priority:pri, page:1})
}

// ═══════════════════════════════════════════════════════════
// PAGE: SR DETAIL
// ═══════════════════════════════════════════════════════════
async function pgSRDetail(pc, params) {
  pc.innerHTML = skeletonPage(false)
  try {
  const id = params.id
  const [{ data:sr }, { data:history }, { data:templates }] = await Promise.all([
    sb.from('sr_list').select('*').eq('id', id).single(),
    sb.from('sr_stage_history').select('*,advanced_by_user:users(name)').eq('sr_id',id).order('advanced_at',{ascending:false}),
    sb.from('templates').select('*').eq('type','email').eq('is_active',true).order('name'),
  ])

  if (!sr) { pc.innerHTML = '<div class="alert alert-error">SR not found.</div>'; return }

  const { data: routeSteps } = sr.route_id
    ? await sb.from('route_steps').select('*').eq('route_id', sr.route_id).order('step_order')
    : { data: [] }

  const isClosed = ['Closed','Archived'].includes(sr.status)
  const isLastStep = routeSteps?.length > 0 && sr.current_step >= routeSteps.length
  const canAdvance = sr.route_id && !isClosed && ['Admin','Manager','Technical'].includes(ME?.role) && !isLastStep

    <div class="modal-body">

        <div class="form-label" style="margin-bottom:10px">Send an email notification for this step?</div>

          <button class="btn btn-ghost" id="adv-yes" style="flex:1;justify-content:center" onclick="advEmailYes()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>

function advEmailYes() {
  document.getElementById('adv-yes').className = 'btn btn-primary'
  document.getElementById('adv-yes').style.flex = '1'
  document.getElementById('adv-yes').style.justifyContent = 'center'
  document.getElementById('adv-no').className = 'btn btn-ghost'
  document.getElementById('adv-no').style.flex = '1'
  document.getElementById('adv-no').style.justifyContent = 'center'
  document.getElementById('tpl-picker').classList.remove('hidden')
  document.getElementById('adv-confirm').disabled = false
  document.getElementById('adv-confirm').textContent = 'Send Email & Advance'
  document.getElementById('adv-confirm')._emailChoice = 'yes'
}
function advEmailNo() {
  document.getElementById('adv-no').className = 'btn btn-secondary'
  document.getElementById('adv-no').style.flex = '1'
  document.getElementById('adv-no').style.justifyContent = 'center'
  document.getElementById('adv-yes').className = 'btn btn-ghost'
  document.getElementById('adv-yes').style.flex = '1'
  document.getElementById('adv-yes').style.justifyContent = 'center'
  document.getElementById('tpl-picker').classList.add('hidden')
  document.getElementById('adv-confirm').disabled = false
  document.getElementById('adv-confirm').textContent = 'Advance Step'
  document.getElementById('adv-confirm')._emailChoice = 'no'
}

async function confirmAdvance(srId, currentStep, totalSteps) {
  const btn = document.getElementById('adv-confirm')
  const emailChoice = btn._emailChoice
  btn.disabled = true; btn.textContent = 'Working…'
  const nextStep = currentStep + 1

  if (emailChoice === 'yes') {
    const tplId = document.getElementById('adv-tpl')?.value
    await sendEmailFromBrowser(srId, tplId)
  }

  await sb.from('sr').update({ current_step: nextStep, status: 'In Progress' }).eq('id', srId)
  await sb.from('sr_stage_history').insert({ sr_id:srId, from_step:currentStep, to_step:nextStep, advanced_by:ME.id })
  await sb.from('audit_log').insert({ action:'SR_STAGE_ADVANCE', user_id:ME.id, target_id:srId, target_type:'sr',
    description:`Advanced to step ${nextStep}${emailChoice==='yes'?' (email sent)':''}` })

  closeModalForce()
  toast(emailChoice==='yes' ? '✓ Step advanced · Email sent' : '✓ Step advanced')
  nav('sr-detail', { id: srId })
}

// ── WhatsApp send ─────────────────────────────────────────
async function sendWA(srId, phone, srNum, status, custName) {
  if (!phone) { toast('No phone number on this SR', 'error'); return }
  const message = `Hello ${custName||'there'}, your service request *${srNum}* status is now: *${status}*. Thank you.`
  try {
    const r = await fetch(`${CFG.waBridgeUrl}/send`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ phone, message }),
      signal: AbortSignal.timeout(15000),
    })
    const d = await r.json()
    if (d.ok) {
      await sb.from('notification_logs').insert({ channel:'whatsapp', sr_id:srId, recipient:phone, body:message, status:'sent', sent_by:ME.id })
      toast('✓ WhatsApp sent')
    } else toast(`✗ ${d.error}`, 'error')
  } catch(e) { toast('✗ WA bridge offline — start wa-service', 'error') }
}

// ── WA helper: look up SR then send (avoids injecting data into onclick) ──
async function sendWABySRId(srId) {
  const { data: sr } = await sb.from('sr_list').select('customer_contact,customer_name,sr_number,status').eq('id', srId).single()
  if (!sr) { toast('Could not load SR', 'error'); return }
  await sendWA(srId, sr.customer_contact??'', sr.sr_number, sr.status, sr.customer_name??'')
}

// ── Email from browser (SMTP via EmailJS-style or smtpjs.com CDN) ──
// Since GitHub Pages has no server, we call smtpjs.com to relay with user's credentials
async function sendEmailFromBrowser(srId, templateId=null, customSubject=null, customBody=null) {
  // Load user smtp creds
  const { data: profile } = await sb.from('users').select('smtp_email,smtp_password,name').eq('id',ME.id).single()
  if (!profile?.smtp_email || !profile?.smtp_password) {
    toast('Your email credentials are not set. Go to Settings → My Email.', 'error'); return false
  }

  let recipient = null, subject = customSubject, body = customBody

  if (srId) {
    const { data: sr } = await sb.from('sr_list').select('*').eq('id', srId).single()
    if (sr) {
      recipient = sr.customer_email
      if (templateId) {
        const { data: tpl } = await sb.from('templates').select('*').eq('id', templateId).single()
        if (tpl) {
          subject = subject || replacePlaceholders(tpl.subject||'', sr, profile.name||profile.smtp_email)
          body    = body    || replacePlaceholders(tpl.body||'', sr, profile.name||profile.smtp_email)
        }
      }
      subject = subject || `Update on Service Request ${sr.sr_number}`
      body    = body    || `Your SR ${sr.sr_number} status is now: ${sr.status}`
    }
  }

  if (!recipient) { toast('No recipient email on this SR', 'error'); return false }

  // Use smtpjs CDN for browser-based SMTP send
  try {
    const sent = await Email.send({
      SecureToken: null,
      Host:     CFG.smtpHost,
      Username: profile.smtp_email,
      Password: profile.smtp_password,
      Port:     CFG.smtpPort,
      To:       recipient,
      From:     `${profile.name||profile.smtp_email} <${profile.smtp_email}>`,
      Subject:  subject,
      Body:     body,
    })
    const ok = sent === 'OK'
    if (ok) {
      await sb.from('notification_logs').insert({ channel:'email', sr_id:srId, recipient, subject, body, template_id:templateId||null, status:'sent', sent_by:ME.id })
      await sb.from('audit_log').insert({ action:'EMAIL_SENT', user_id:ME.id, target_id:srId, target_type:'sr', description:`Email sent to ${recipient}` })
    }
    return ok
  } catch(e) { console.error('Email error:', e); return false }
}

function replacePlaceholders(str, sr, senderName) {
  return str
    .replace(/\{\{sr_number\}\}/g,         sr.sr_number??'')
    .replace(/\{\{customer_name\}\}/g,     sr.customer_name??'')
    .replace(/\{\{owner_name\}\}/g,        sr.owner_name??'')
    .replace(/\{\{issue_type\}\}/g,        sr.issue_type??'')
    .replace(/\{\{issue_description\}\}/g, sr.issue_description??'')
    .replace(/\{\{status\}\}/g,            sr.status??'')
    .replace(/\{\{priority\}\}/g,          sr.priority??'')
    .replace(/\{\{resolution\}\}/g,        sr.resolution??'')
    .replace(/\{\{company_name\}\}/g,      senderName)
    .replace(/\{\{account\}\}/g,           sr.account??'')
}

// ─── Sheets sync (non-blocking, calls Apps Script directly) ──
async function syncSheetsRow(srId, status, resolvedAt, resolution) {
  if (!CFG.appsScriptUrl) return
  const { data: sr } = await sb.from('sr_list').select('*').eq('id', srId).single()
  if (!sr) return
  fetch(CFG.appsScriptUrl, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ token:CFG.appsScriptToken, action:'update_sr_row',
      sr_number:sr.sr_number, status, resolved_at:resolvedAt, resolution, owner_name:sr.owner_name }),
  }).catch(()=>{})
}

async function createDriveFolder(srId) {
  if (!CFG.appsScriptUrl) return
  const { data: sr } = await sb.from('sr_list').select('*').eq('id', srId).single()
  if (!sr) return
  const year = new Date().getFullYear().toString()
  fetch(CFG.appsScriptUrl, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ token:CFG.appsScriptToken, action:'create_sr_folder', sr_number:sr.sr_number, year }),
  }).then(r=>r.json()).then(async d => {
    if (d.ok) {
      await sb.from('sr').update({ drive_folder_url:d.folder_url, drive_folder_id:d.folder_id }).eq('id', srId)
      fetch(CFG.appsScriptUrl, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ token:CFG.appsScriptToken, action:'append_sr_row',
          sr_number:sr.sr_number, status:sr.status, reported_at:sr.reported_at,
          account:sr.account, customer_name:sr.customer_name, customer_contact:sr.customer_contact,
          customer_email:sr.customer_email, issue_type:sr.issue_type,
          issue_description:sr.issue_description, owner_name:sr.owner_name,
          creator_name:sr.creator_name, priority:sr.priority, route_name:sr.route_name,
          folder_url:d.folder_url }),
      }).catch(()=>{})
    }
  }).catch(()=>{})
}

async function pgRoutes(pc) {
  pc.innerHTML = skeletonPage()
  try {
  const { data: routes } = await sb.from('routes').select('*').order('name')
  let selectedRoute = null, selectedSteps = []

  render()

  function render() {
    pc.innerHTML = `
      <div class="page-header">
        <div><div class="page-title">Routes</div></div>
        ${['Admin','Manager'].includes(ME?.role) ? `<button class="btn btn-primary" onclick="openNewRoute()">+ New Route</button>` : ''}
      </div>
      <div class="grid-2">
        <div class="card">
          <h4 style="margin-bottom:12px">All Routes</h4>
          ${!routes?.length ? '<div style="color:var(--text-muted);font-size:.85rem">No routes yet.</div>' :
          routes.map(r=>`<div onclick="selectRoute('${r.id}')" style="display:flex;align-items:center;justify-content:space-between;padding:10px;border-radius:var(--radius);cursor:pointer;background:${selectedRoute?.id===r.id?'var(--accent-dim)':'transparent'};margin-bottom:4px;border:1px solid ${selectedRoute?.id===r.id?'var(--accent)':'transparent'}">
            <div>
              <div style="font-weight:600;font-size:.875rem">${escHtml(r.name??'')}</div>
              ${r.description?`<div style="font-size:.75rem;color:var(--text-muted)">${escHtml(r.description)}</div>`:''}
            </div>
            <div style="display:flex;align-items:center;gap:6px">
              <span class="badge ${r.is_active?'badge-in-progress':'badge-closed'}">${r.is_active?'Active':'Inactive'}</span>
              ${['Admin','Manager'].includes(ME?.role) ? `<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();toggleRoute('${r.id}',${r.is_active})">${r.is_active?'Disable':'Enable'}</button>
              <button class="btn btn-ghost btn-sm text-red" onclick="event.stopPropagation();deleteRoute('${r.id}')">Delete</button>` : ''}
            </div>
          </div>`).join('')}
        </div>
        <div class="card" id="steps-panel">
          ${selectedRoute
            ? `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
                <h4>${selectedRoute.name} — Steps</h4>
                ${['Admin','Manager'].includes(ME?.role)?`<button class="btn btn-secondary btn-sm" onclick="openAddStep('${selectedRoute.id}')">+ Add Step</button>`:''}
              </div>
              ${!selectedSteps.length ? '<div style="color:var(--text-muted);font-size:.85rem">No steps yet.</div>' :
              selectedSteps.map((s,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg-elevated);border-radius:var(--radius);margin-bottom:6px">
                <div class="route-step-dot">${s.step_order}</div>
                <div style="flex:1">
                  <div style="font-weight:600;font-size:.85rem">${escHtml(s.name??'')}</div>
                  <div style="font-size:.75rem;color:var(--text-muted)">${s.assigned_role} ${s.sla_hours?`· SLA ${s.sla_hours}h`:''}</div>
                </div>
                ${['Admin','Manager'].includes(ME?.role)?`
                <button class="btn btn-ghost btn-sm" onclick="moveStep('${s.id}','up','${selectedRoute.id}')" ${i===0?'disabled':''}>↑</button>
                <button class="btn btn-ghost btn-sm" onclick="moveStep('${s.id}','down','${selectedRoute.id}')" ${i===selectedSteps.length-1?'disabled':''}>↓</button>
                <button class="btn btn-ghost btn-sm text-red" onclick="deleteStep('${s.id}','${selectedRoute.id}')">✕</button>`:''}
              </div>`).join('')}`
            : '<div style="color:var(--text-muted);font-size:.85rem">Select a route to see its steps.</div>'}
        </div>
      </div>`
  }

  window.selectRoute = async (id) => {
    selectedRoute = routes.find(r=>r.id===id)
    const { data } = await sb.from('route_steps').select('*').eq('route_id', id).order('step_order')
    selectedSteps = data ?? []
    render()
  }
  window.toggleRoute = async (id, current) => {
    await sb.from('routes').update({ is_active: !current }).eq('id', id)
    const r = routes.find(r=>r.id===id); if (r) r.is_active = !current
    render()
  }
  window.deleteRoute = async (id) => {
    if (!confirm('Delete this route and all its steps?')) return
    await sb.from('routes').delete().eq('id', id)
    const idx = routes.findIndex(r=>r.id===id); if (idx>-1) routes.splice(idx,1)
    if (selectedRoute?.id===id) { selectedRoute=null; selectedSteps=[] }
    render()
  }
  window.deleteStep = async (stepId, routeId) => {
    await sb.from('route_steps').delete().eq('id', stepId)
    selectRoute(routeId)
  }
  window.moveStep = async (stepId, dir, routeId) => {
    const idx = selectedSteps.findIndex(s=>s.id===stepId)
    const target = dir==='up' ? idx-1 : idx+1
    if (target<0||target>=selectedSteps.length) return
    const a=selectedSteps[idx], b=selectedSteps[target]
    await Promise.all([
      sb.from('route_steps').update({ step_order:b.step_order }).eq('id', a.id),
      sb.from('route_steps').update({ step_order:a.step_order }).eq('id', b.id),
    ])
    selectRoute(routeId)
  }
}

  } catch(e) {
    pc.innerHTML = pageError('Could not load routes', e.message, true, 'routes')
  }
}

async function submitTemplate(existingId) {
  const name = document.getElementById('nt-name')?.value?.trim()
  const body = document.getElementById('nt-body')?.value?.trim()
  if (!name||!body) return
  const data = {
    name, body, type:document.getElementById('nt-type')?.value,
    subject:document.getElementById('nt-subj')?.value||null, is_active:true,
  }
  if (existingId) await sb.from('templates').update(data).eq('id', existingId)
  else await sb.from('templates').insert({ ...data, created_by:ME.id })
  closeModalForce(); toast('✓ Template saved'); nav('templates')
}

async function toggleTemplate(id, current) {
  await sb.from('templates').update({ is_active:!current }).eq('id', id)
  nav('templates')
}
async function deleteTemplate(id) {
  if (!confirm('Delete this template?')) return
  await sb.from('templates').delete().eq('id', id)
  toast('Template deleted'); nav('templates')
}

// ═══════════════════════════════════════════════════════════
async function pgWhatsApp(pc) {
  let waStatus = { connected:false }
  let pollInterval = null

  async function fetchWAStatus() {
    try {
      const r = await fetch(`${CFG.waBridgeUrl}/status`, { signal:AbortSignal.timeout(4000) })
      waStatus = await r.json()
    } catch { waStatus = { connected:false, error:'Bridge offline' } }
    renderWA()
  }

  function renderWA() {
    const connected = waStatus.connected
    document.getElementById('wa-content').innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
        <div style="width:10px;height:10px;border-radius:50%;background:${connected?'var(--green)':'var(--text-muted)'};box-shadow:${connected?'0 0 8px var(--green)':'none'}"></div>
        <span style="font-weight:600">${connected ? `Connected ${waStatus.phone?'· '+waStatus.phone:''}` : 'Disconnected'}</span>
        <button class="btn btn-secondary btn-sm" onclick="${connected?`waDisconnect()`:`waConnect()`}" style="margin-left:auto">
          ${connected ? 'Disconnect' : 'Connect / Get QR'}
        </button>
      </div>
      ${waStatus.qr ? `<div style="text-align:center;padding:20px">
        <p style="color:var(--text-muted);font-size:.85rem;margin-bottom:16px">Scan this QR with WhatsApp on your phone</p>
        <img src="${waStatus.qr}" style="max-width:260px;border-radius:var(--radius-lg);border:4px solid white"/>
      </div>` : ''}
      ${connected ? `
      <hr style="border:none;border-top:1px solid var(--border);margin:20px 0"/>
      <h4 style="margin-bottom:12px">Send Test Message</h4>
      <div style="display:flex;flex-direction:column;gap:12px;max-width:480px">
        <div class="form-group"><label class="form-label req">Phone (with country code)</label>
          <input class="form-input" id="wa-phone" placeholder="+91 9999999999"/></div>
        <div class="form-group"><label class="form-label req">Message</label>
          <textarea class="form-textarea" id="wa-msg" rows="3" placeholder="Type your message…"></textarea></div>
        <button class="btn btn-primary" onclick="waSendDirect()">Send</button>
        <div id="wa-send-status"></div>
      </div>` : `<div class="alert alert-info" style="margin-top:12px">
        Start the WhatsApp bridge service: <code style="font-family:var(--font-mono);background:rgba(0,0,0,.3);padding:2px 6px;border-radius:4px">cd wa-service && node bridge.js</code>
        Then click Connect to get a QR code.
      </div>`}`
  }

  pc.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">WhatsApp</div><div class="page-subtitle">QR session for SR notifications and messaging</div></div>
    </div>
    <div class="card" style="max-width:600px" id="wa-content">Loading…</div>`

  fetchWAStatus()
  pollInterval = setInterval(fetchWAStatus, 4000)

  // Cleanup polling when navigating away
  const waCleanup = () => { clearInterval(pollInterval); window.removeEventListener('hashchange', waCleanup) }
  window.addEventListener('hashchange', waCleanup)

  window.waConnect = async () => {
    try { await fetch(`${CFG.waBridgeUrl}/connect`,{method:'POST',signal:AbortSignal.timeout(5000)}) } catch {}
    setTimeout(fetchWAStatus, 1500)
  }
  window.waDisconnect = async () => {
    try { await fetch(`${CFG.waBridgeUrl}/disconnect`,{method:'POST',signal:AbortSignal.timeout(5000)}) } catch {}
    waStatus = { connected:false }; renderWA()
  }
  window.waSendDirect = async () => {
    const phone = document.getElementById('wa-phone')?.value
    const message = document.getElementById('wa-msg')?.value
    if (!phone||!message) return
    const el = document.getElementById('wa-send-status')
    el.textContent = 'Sending…'; el.className = ''
    try {
      const r = await fetch(`${CFG.waBridgeUrl}/send`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone,message}),signal:AbortSignal.timeout(15000)})
      const d = await r.json()
      el.textContent = d.ok ? '✓ Sent!' : `✗ ${d.error}`
      el.className = d.ok ? 'text-green' : 'text-red'
    } catch(e) { el.textContent='✗ Bridge offline'; el.className='text-red' }
  }
}

// PAGE: REPORTS
// ═══════════════════════════════════════════════════════════
async function pgReports(pc) {
  let range = '30d'

  async function loadReport() {
    const now = new Date()
    const fromDate = range==='7d' ? new Date(now-7*86400000).toISOString()
                   : range==='30d'? new Date(now-30*86400000).toISOString()
                   : range==='90d'? new Date(now-90*86400000).toISOString() : null

    let q = sb.from('sr').select('id,status,priority,owner_id,issue_type,reported_at,closed_at')
    if (fromDate) q = q.gte('reported_at', fromDate)
    const [{ data: srs }, { data: users }] = await Promise.all([q, sb.from('users').select('id,name')])

    const userMap = Object.fromEntries((users??[]).map(u=>[u.id,u.name]))
    const all = srs ?? []

    const byStatus   = {}, byPriority = {}, byOwner = {}, byType = {}
    let totalResMs = 0, resolvedCount = 0

    all.forEach(s => {
      byStatus[s.status]     = (byStatus[s.status]??0)+1
      byPriority[s.priority] = (byPriority[s.priority]??0)+1
      const n = userMap[s.owner_id]??'Unknown'
      if (!byOwner[n]) byOwner[n]={open:0,closed:0,total:0}
      byOwner[n].total++
      if (s.status==='Closed') byOwner[n].closed++; else byOwner[n].open++
      byType[s.issue_type??'Other'] = (byType[s.issue_type??'Other']??0)+1
      if (s.closed_at&&s.reported_at) {
        totalResMs += new Date(s.closed_at)-new Date(s.reported_at)
        resolvedCount++
      }
    })
    const avgHours = resolvedCount>0 ? Math.round(totalResMs/resolvedCount/3600000) : null

    try {
    document.getElementById('report-body').innerHTML = `
      <div class="grid-4 mb-5">
        ${statCard('Total SRs', all.length, 'var(--blue)')}
        ${statCard('Open', byStatus['Open']??0, 'var(--blue)')}
        ${statCard('Closed', byStatus['Closed']??0, 'var(--text-muted)')}
        ${statCard('Avg Resolution', avgHours!=null?avgHours+'h':'—', 'var(--accent)')}
      </div>
      <div class="grid-2 mb-4">
        <div class="card">
          <h4 style="margin-bottom:12px">By Status</h4>
          ${barChart(byStatus,['Open','In Progress','Pending','Closed','Archived'])}
        </div>
        <div class="card">
          <h4 style="margin-bottom:12px">By Priority</h4>
          ${barChart(byPriority,['Critical','High','Medium','Low'])}
        </div>
      </div>
      <div class="card mb-4">
        <h4 style="margin-bottom:12px">By Owner</h4>
        <table class="data-table"><thead><tr><th>Name</th><th>Total</th><th>Open</th><th>Closed</th><th>Close Rate</th></tr></thead><tbody>
        ${Object.entries(byOwner).sort((a,b)=>b[1].total-a[1].total).map(([name,v])=>`<tr>
          <td style="font-weight:500">${escHtml(name)}</td>
          <td>${v.total}</td>
          <td>${v.open}</td>
          <td>${v.closed}</td>
          <td>${v.total>0?Math.round(v.closed/v.total*100)+'%':'—'}</td>
        </tr>`).join('')}
        </tbody></table>
      </div>
      <div class="card">
        <h4 style="margin-bottom:12px">By Issue Type</h4>
        ${barChart(byType, Object.keys(byType).sort((a,b)=>(byType[b]||0)-(byType[a]||0)))}
      </div>`
  }

  pc.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Reports</div></div>
      <div style="display:flex;gap:6px">
        ${['7d','30d','90d','all'].map(r=>`<button class="btn ${r===range?'btn-primary':'btn-ghost'} btn-sm" onclick="setRange('${r}')">${r==='all'?'All Time':r}</button>`).join('')}
      </div>
    </div>
    <div id="report-body">${skeletonPage(false)}</div>`

  window.setRange = async (r) => { range=r; document.getElementById('report-body').innerHTML=skeletonPage(false); await loadReport()
    document.querySelectorAll('#page-content .btn').forEach(b=>{ b.className=b.getAttribute('onclick')?.includes(`'${r}'`)?'btn btn-primary btn-sm':'btn btn-ghost btn-sm' })
  }
    } catch(e) {
      document.getElementById('report-body').innerHTML = pageError('Could not load report', e.message, true, 'reports')
    }
  }
  loadReport()
}

function barChart(data, keys) {
  const max = Math.max(...keys.map(k=>data[k]??0), 1)
  return `<div style="display:flex;flex-direction:column;gap:8px">
    ${keys.filter(k=>data[k]).map(k=>`<div style="display:flex;align-items:center;gap:10px">
      <div style="width:120px;font-size:.8rem;color:var(--text-secondary);text-align:right;flex-shrink:0">${escHtml(String(k))}</div>
      <div style="flex:1;background:var(--bg-elevated);border-radius:4px;height:20px;position:relative">
        <div style="width:${Math.round((data[k]??0)/max*100)}%;background:var(--accent);height:100%;border-radius:4px;min-width:4px"></div>
      </div>
      <div style="width:30px;font-size:.8rem;font-weight:600;color:var(--text-primary)">${data[k]??0}</div>
    </div>`).join('')}
  </div>`
}

          <div class="form-group"><label class="form-label">SR Folder ID</label>
            <input class="form-input" id="sd-folder" value="${escHtml(drv.sr_folder_id??'')}" placeholder="Google Drive folder ID"/>
            <div class="form-hint">Copy from the Drive URL: drive.google.com/drive/folders/<strong>THIS_PART</strong></div></div>
          <div class="form-group"><label class="form-label">Apps Script Web App URL</label>
            <input class="form-input" id="sd-url" value="${escHtml(drv.apps_script_url??'')}" placeholder="https://script.google.com/macros/s/…/exec"/>
            <div class="form-hint">Deploy Code.gs as a Web App and paste the URL here</div></div>
          <div class="form-group"><label class="form-label">Apps Script Token</label>
            <input class="form-input" id="sd-token" type="password" value="${escHtml(drv.apps_script_token??'')}" placeholder="secret token matching Code.gs"/></div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:20px;flex-wrap:wrap">
          <button class="btn btn-primary" onclick="saveDrive()">Save Drive Settings</button>
          <button class="btn btn-secondary" onclick="testDrive()">Test Connection</button>
          <div id="drive-msg" style="font-size:.8rem"></div>
        </div>
      </div>`,
    wa: `
      <div class="card" style="max-width:560px">
        <h3 style="margin-bottom:4px">WhatsApp Bridge</h3>
        <p style="color:var(--text-muted);font-size:.8rem;margin-bottom:16px">The WhatsApp bridge is a separate service (wa-service/bridge.js). Enter its URL here.</p>
        <div class="form-group"><label class="form-label">Bridge URL</label>
          <input class="form-input" id="sw-url" value="${escHtml(wa.bridge_url??'http://localhost:3001')}" placeholder="http://localhost:3001"/>
          <div class="form-hint">URL where bridge.js is running</div></div>
        <div class="alert alert-info" style="margin-top:12px;font-size:.78rem">
          Start the bridge: <code style="font-family:var(--font-mono);background:rgba(0,0,0,.3);padding:2px 6px;border-radius:4px">cd wa-service && node bridge.js</code>
        </div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:16px">
          <button class="btn btn-primary" onclick="saveWA()">Save WhatsApp Settings</button>
          <div id="wa-msg" style="font-size:.8rem;color:var(--green)"></div>
        </div>
      </div>`,
  }

  window.sendTestEmail = async (toEmail, password) => {
    try {
      const sent = await Email.send({
        SecureToken: null,
        Host:     CFG.smtpHost,
        Username: toEmail,
        Password: password,
        Port:     CFG.smtpPort,
        To:       toEmail,
        From:     toEmail,
        Subject:  'SR Platform — Test Email',
        Body:     'This is a test email. Your email credentials are working correctly.',
      })
      return sent === 'OK'
    } catch(e) { console.error('Test email error:', e); return false }
  }

  window.switchTab = (t) => {
    tab = t
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
    document.getElementById('tab-'+t)?.classList.add('active')
    document.getElementById('tab-content').innerHTML = panels[t]
  }

  window.saveEmailCreds = async () => {
    const em = document.getElementById('se-email')?.value?.trim()
    const pw = document.getElementById('se-pass')?.value
    const el = document.getElementById('email-creds-msg')
    const { error } = await sb.from('users').update({ smtp_email:em, smtp_password:pw }).eq('id', ME.id)
    if (!error) { ME.smtp_email=em; ME.smtp_password=pw }
    el.textContent = error ? `✗ ${error.message}` : '✓ Saved'
    el.style.color = error ? 'var(--red)' : 'var(--green)'
  }
  window.testEmail = async () => {
    const em = document.getElementById('se-email')?.value?.trim()
    const pw = document.getElementById('se-pass')?.value
    const el = document.getElementById('email-creds-msg')
    el.textContent = 'Sending test…'; el.style.color='var(--text-muted)'
    // Save first then test
    await sb.from('users').update({ smtp_email:em, smtp_password:pw }).eq('id', ME.id)
    const ok = await sendTestEmail(em, pw)
    el.textContent = ok ? '✓ Test email sent to '+em : '✗ Failed — check credentials'
    el.style.color = ok ? 'var(--green)' : 'var(--red)'
  }
  window.saveGeneral = async () => {
    await sb.from('settings').upsert({ key:'general', value:{ company_name:document.getElementById('sg-company')?.value, sr_prefix:document.getElementById('sg-prefix')?.value, timezone:document.getElementById('sg-tz')?.value }, updated_by:ME.id })
    const el=document.getElementById('gen-msg'); el.textContent='✓ Saved'; setTimeout(()=>el.textContent='',3000)
  }
  window.saveDrive = async () => {
    const url = document.getElementById('sd-url')?.value?.trim()
    const token = document.getElementById('sd-token')?.value
    await sb.from('settings').upsert({ key:'drive', value:{ sr_folder_id:document.getElementById('sd-folder')?.value, apps_script_url:url, apps_script_token:token }, updated_by:ME.id })
    CFG.appsScriptUrl = url; CFG.appsScriptToken = token
    const el=document.getElementById('drive-msg'); el.textContent='✓ Saved'; el.style.color='var(--green)'; setTimeout(()=>el.textContent='',3000)
  }
  window.testDrive = async () => {
    const url=document.getElementById('sd-url')?.value?.trim()
    const el=document.getElementById('drive-msg'); el.textContent='Testing…'; el.style.color='var(--text-muted)'
    try {
      const r = await fetch(url,{signal:AbortSignal.timeout(5000)})
      const d = await r.json()
      el.textContent=d.ok?'✓ Connected!':'✗ Bridge error: '+d.error; el.style.color=d.ok?'var(--green)':'var(--red)'
    } catch { el.textContent='✗ Could not reach URL'; el.style.color='var(--red)' }
  }
  window.saveWA = async () => {
    const url=document.getElementById('sw-url')?.value?.trim()
    await sb.from('settings').upsert({ key:'whatsapp', value:{ bridge_url:url }, updated_by:ME.id })
    CFG.waBridgeUrl=url
    const el=document.getElementById('wa-msg'); el.textContent='✓ Saved'; setTimeout(()=>el.textContent='',3000)
  }

  switchTab('email')
  } catch(e) {
    pc.innerHTML = pageError('Could not load settings', e.message, true, 'settings')
  }
}
</script>
<!-- smtpjs CDN for browser-based SMTP send (no server needed) -->
<script src="https://smtpjs.com/v3/smtp.js"></script>
</body>
</html>
