              <div class="flex gap-2 items-center flex-wrap">
                <span style="font-size:.73rem;color:var(--text-3)">To:</span>
                <span id="esp-to" style="font-size:.78rem;font-weight:600;color:var(--accent-lg)">—</span>
              </div>
              <div class="flex gap-2 items-center" style="margin-top:4px">
                <span style="font-size:.73rem;color:var(--text-3)">Subject:</span>
                <span id="esp-subject" style="font-size:.83rem;font-weight:700">—</span>
              </div>
            </div>
            <div style="padding:14px;min-height:120px;white-space:pre-wrap;font-size:.83rem;color:var(--text-2);line-height:1.7" id="esp-body">—</div>
          </div>
          <div style="font-size:.73rem;color:var(--text-3)">* Preview uses mock data to simulate a real service request.</div>
          <button class="btn btn-secondary btn-sm" onclick="window._refreshPreview()" style="align-self:flex-start">↺ Refresh Preview</button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModalForce()">Cancel</button>
        <button class="btn btn-primary" onclick="window._saveStep('${stepId||''}','${routeId}')">
          ${isEdit?'Save Changes':'Add Step'}
        </button>
      </div>`

    if (activeTab === 'preview') setTimeout(window._refreshPreview, 50)
  }

  window._stepTab = (tab) => {
    activeTab = tab
    const tabs = document.querySelectorAll('.modal-tabs .tab-btn')
    tabs.forEach(t => t.classList.toggle('active', t.textContent.toLowerCase().includes(tab==='general'?'general':tab==='email'?'email':'preview')))
    const panels = ['general','email','preview']
    panels.forEach(p => {
      const el = document.getElementById(`step-tab-${p}`)
      if (el) el.style.display = p===tab?'flex':'none'
    })
    if (tab === 'preview') setTimeout(window._refreshPreview, 50)
  }

  window._toggleEmail = () => {
    const toggle = document.getElementById('email-toggle')
    const config = document.getElementById('email-config-area')
    if (!toggle || !config) return
    const newState = !toggle.classList.contains('on')
    toggle.classList.toggle('on', newState)
    config.style.display = newState ? 'flex' : 'none'
  }

  window._onTplChange = async (tplId) => {
    if (!tplId) return
    const { data:tpl } = await sb.from('templates').select('*').eq('id', tplId).single()
    if (tpl) {
      const subj = document.getElementById('s-email-subj')
      const body = document.getElementById('s-email-body')
      if (subj && !subj.value) subj.value = tpl.subject || ''
      if (body && !body.value) body.value = tpl.body || ''
    }
  }

  window._insertPH = (ph) => {
    const el = document.getElementById('s-email-body')
    if (!el) return
    const s = el.selectionStart, e = el.selectionEnd
    el.value = el.value.slice(0,s) + `{{${ph}}}` + el.value.slice(e)
    el.focus()
    el.selectionStart = el.selectionEnd = s + ph.length + 4
  }

  window._refreshPreview = async () => {
    const mockSR = {
      sr_number:'SR-2026-1001', customer_name:'John Doe', customer_email:'john.doe@example.com',
      owner_name:'Sidharth Kumar', account:'Acme Corp', route_name:'IT Support Route',
      issue_type:'Technical Support', status:'In Progress', priority:'High',
      resolution:'Rebooted server.', company_name:'SKS 3D',
    }
    const tplId = document.getElementById('s-email-tpl')?.value
    let subj = document.getElementById('s-email-subj')?.value||''
    let body = document.getElementById('s-email-body')?.value||''
    const nameVal = document.getElementById('s-name')?.value||'Step'

    if (tplId && (!subj || !body)) {
      const { data:tpl } = await sb.from('templates').select('*').eq('id', tplId).single()
      if (tpl) { subj = subj||tpl.subject||''; body = body||tpl.body||'' }
    }
    subj = subj || `Update on Service Request ${mockSR.sr_number}`
    body = body || `Your SR ${mockSR.sr_number} status is: ${mockSR.status}`

    const recs = []
    document.querySelectorAll('.s-rec-chk').forEach(c => {
      if (c.checked) {
        if (c.value==='customer') recs.push(mockSR.customer_email)
        else if (c.value==='owner') recs.push('owner@sks3d.com')
        else recs.push('creator@sks3d.com')
      }
    })
    const custRec = document.getElementById('s-custom-rec')?.value?.trim()
    if (custRec) recs.push(custRec)

    const evalPH = s => s.replace(/\{\{(\w+)\}\}/g, (_, k) => {
      const map = { ...mockSR, name:mockSR.customer_name, email:mockSR.customer_email, step_name:nameVal, company:mockSR.company_name, assigned_user:mockSR.owner_name, completion_time:new Date().toLocaleString() }
      return map[k]??''
    })

    const toEl   = document.getElementById('esp-to')
    const subjEl = document.getElementById('esp-subject')
    const bodyEl = document.getElementById('esp-body')
    if (toEl)   toEl.textContent   = recs.length ? recs.join(', ') : '(No recipients selected)'
    if (subjEl) subjEl.textContent = evalPH(subj)
    if (bodyEl) bodyEl.textContent = evalPH(body)
  }

  window._saveStep = async (sId, rId) => {
    const nameVal = document.getElementById('s-name')?.value?.trim()
    if (!nameVal) { toast('Step name is required', 'error'); return }

    const emailEnabledVal = document.getElementById('email-toggle')?.classList.contains('on') || false
    const tplVal          = document.getElementById('s-email-tpl')?.value || null

    const recs = []
    document.querySelectorAll('.s-rec-chk').forEach(c => { if (c.checked) recs.push(c.value) })
    const custRec = document.getElementById('s-custom-rec')?.value?.trim()
    if (custRec) recs.push(custRec)

    const updateData = {
      name:            nameVal,
      description:     document.getElementById('s-desc')?.value || null,
      assigned_role:   document.getElementById('s-role')?.value || 'Technical',
      sla_hours:       document.getElementById('s-sla')?.value ? parseInt(document.getElementById('s-sla').value) : null,
      email_enabled:   emailEnabledVal,
      email_template:  tplVal,
      email_recipients: recs.join(',') || 'customer',
      email_subject:   document.getElementById('s-email-subj')?.value || null,
      email_body:      document.getElementById('s-email-body')?.value || null,
      // Legacy columns (maintain compatibility)
      email_trigger_enabled: emailEnabledVal,
      email_subject_override: document.getElementById('s-email-subj')?.value || null,
      email_body_override:    document.getElementById('s-email-body')?.value || null,
    }

    let error
    if (sId) {
      const res = await sb.from('route_steps').update(updateData).eq('id', sId)
      error = res.error
    } else {
      const { data:existing } = await sb.from('route_steps').select('step_order').eq('route_id',rId).order('step_order',{ascending:false}).limit(1)
      const nextOrder = (existing?.[0]?.step_order ?? 0) + 1
      const res = await sb.from('route_steps').insert({ ...updateData, route_id:rId, step_order:nextOrder, is_required:true })
      error = res.error
    }

    if (error) { toast('Error: '+error.message, 'error'); return }
    closeModalForce()
    toast(`✓ Step ${sId?'updated':'added'} successfully`)
    // Refresh route view
    const { data } = await sb.from('route_steps').select('*').eq('route_id', rId).order('step_order')
    if (window.selectRoute) window.selectRoute(rId)
  }

  modal('<div class="modal-body" style="padding:20px;color:var(--text-3)">Loading…</div>', 'modal-lg')
  renderModal()
}

function isLocalBridge(url) {
  try {
    const u = new URL(url)
    return ['localhost','127.0.0.1'].includes(u.hostname) && !['localhost','127.0.0.1'].includes(location.hostname)
  } catch { return true }
}

async function pgWhatsApp(pc) {
  let waStatus = { connected:false }
  let pollInterval = null

  async function fetchStatus() {
    if (!CFG.waBridgeUrl || isLocalBridge(CFG.waBridgeUrl)) {
      waStatus = { connected:false, error:'Bridge unavailable from this host' }
      renderWA(); return
    }
    try {
      const r = await fetch(`${CFG.waBridgeUrl}/status`, { signal:AbortSignal.timeout(4000) })
      waStatus = await r.json()
    } catch { waStatus = { connected:false, error:'Bridge offline' } }
    renderWA()
  }

  function renderWA() {
    const conn = waStatus.connected
    const waContent = document.getElementById('wa-content')
    if (!waContent) return
    waContent.innerHTML = `
      <div class="flex items-center gap-3 mb-5">
        <div style="width:10px;height:10px;border-radius:50%;background:${conn?'var(--green)':'var(--text-3)'};box-shadow:${conn?'0 0 8px var(--green)':'none'};flex-shrink:0"></div>
        <div>
          <div style="font-weight:700;font-size:.95rem">${conn?'Connected':'Disconnected'}</div>
          ${conn&&waStatus.phone?`<div style="font-size:.73rem;color:var(--text-2)">${escHtml(waStatus.phone)}</div>`:''}
        </div>
        <button class="btn ${conn?'btn-danger':'btn-primary'} btn-sm ml-auto" onclick="${conn?`window.waDisconnect()`:`window.waConnect()`}">
          ${conn?'Disconnect':'Connect / Get QR'}
        </button>
      </div>
      ${waStatus.qr ? `<div style="text-align:center;padding:24px;background:var(--bg-elevated);border-radius:var(--r-lg);border:1px solid var(--border)">
        <p style="color:var(--text-2);font-size:.83rem;margin-bottom:16px">Scan this QR with WhatsApp on your phone</p>
        <img src="${escHtml(waStatus.qr)}" style="max-width:240px;border-radius:var(--r);border:3px solid white"/>
      </div>` : ''}
      ${conn ? `<div style="margin-top:20px;padding-top:20px;border-top:1px solid var(--border)">
        <div class="section-title mb-4">Send Test Message</div>
        <div style="display:flex;flex-direction:column;gap:12px;max-width:480px">
          <div class="form-group">
            <label class="form-label req">Phone (with country code)</label>
            <input class="form-input" id="wa-phone" placeholder="+91 9999999999"/>
          </div>
          <div class="form-group">
            <label class="form-label req">Message</label>
            <textarea class="form-textarea" id="wa-msg" rows="3" placeholder="Type your message…"></textarea>
          </div>
          <button class="btn btn-primary" onclick="window.waSendDirect()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Send
          </button>
          <div id="wa-send-status" style="font-size:.8rem"></div>
        </div>
      </div>` : `<div class="alert alert-info" style="margin-top:14px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01" stroke-linecap="round"/></svg>
        <div>Start the WhatsApp bridge service first: <code style="font-family:var(--mono);background:rgba(0,0,0,.3);padding:2px 6px;border-radius:3px">cd wa-service && node bridge.js</code></div>
      </div>`}`
  }

  pc.innerHTML = `
    <div class="page-header">
      <div>
        <div class="page-title">WhatsApp</div>
        <div class="page-subtitle">QR session for SR notifications and direct messaging</div>
      </div>
    </div>
    <div class="card" style="max-width:600px" id="wa-content">
      <div style="color:var(--text-3);font-size:.83rem">Checking connection…</div>
    </div>`

  fetchStatus()
  if (CFG.waBridgeUrl && !isLocalBridge(CFG.waBridgeUrl)) {
    pollInterval = setInterval(fetchStatus, 4000)
  }
  const cleanup = () => { clearInterval(pollInterval); window.removeEventListener('hashchange', cleanup) }
  window.addEventListener('hashchange', cleanup)

  window.waConnect = async () => {
    if (!CFG.waBridgeUrl || isLocalBridge(CFG.waBridgeUrl)) return
    try { await fetch(`${CFG.waBridgeUrl}/connect`,{method:'POST',signal:AbortSignal.timeout(5000)}) } catch {}
    setTimeout(fetchStatus, 1500)
  }
  window.waDisconnect = async () => {
    if (!CFG.waBridgeUrl || isLocalBridge(CFG.waBridgeUrl)) return
    try { await fetch(`${CFG.waBridgeUrl}/disconnect`,{method:'POST',signal:AbortSignal.timeout(5000)}) } catch {}
    waStatus = { connected:false }; renderWA()
  }
  window.waSendDirect = async () => {
    const phone   = document.getElementById('wa-phone')?.value
    const message = document.getElementById('wa-msg')?.value
    if (!phone||!message) { toast('Phone and message are required', 'error'); return }
    const el = document.getElementById('wa-send-status')
    if (el) { el.textContent = 'Sending…'; el.style.color='var(--text-3)' }
    if (!CFG.waBridgeUrl || isLocalBridge(CFG.waBridgeUrl)) {
      if (el) { el.textContent='Bridge unavailable'; el.style.color='var(--red)' }; return
    }
    try {
      const r = await fetch(`${CFG.waBridgeUrl}/send`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone,message}),signal:AbortSignal.timeout(15000)})
      const d = await r.json()
      if (el) { el.textContent=d.ok?'✓ Sent!':'✗ '+d.error; el.style.color=d.ok?'var(--green)':'var(--red)' }
    } catch(e) { if (el) { el.textContent='✗ Bridge offline'; el.style.color='var(--red)' } }
  }
}

}

async function submitInvite() {
  const email = document.getElementById('inv-email')?.value?.trim()
  const name  = document.getElementById('inv-name')?.value?.trim()
  const role  = document.getElementById('inv-role')?.value
  if (!email||!name) { toast('Email and name are required', 'error'); return }
  await sb.from('users').upsert({ email, name, role, status:'active' }, { onConflict:'email' })
  closeModalForce()
  toast('Profile created. Invite user via Supabase Dashboard → Auth → Invite user.', 'info')
  nav('users')
}

// ═══════════════════════════════════════════════════════════
// PAGE: REPORTS
// ═══════════════════════════════════════════════════════════
async function pgReports(pc) {
  let range = '30d'

  async function loadReport() {
    const body = document.getElementById('report-body')
    if (!body) return
    body.innerHTML = skeletonPage()
    try {
      const now = new Date()
      const fromDate = range==='7d'?new Date(now-7*86400000).toISOString():range==='30d'?new Date(now-30*86400000).toISOString():range==='90d'?new Date(now-90*86400000).toISOString():null
      let q = sb.from('sr').select('id,status,priority,owner_id,issue_type,reported_at,closed_at')
      if (fromDate) q = q.gte('reported_at', fromDate)
      const [{ data:srs }, { data:users }] = await Promise.all([q, sb.from('users').select('id,name')])
      const userMap = Object.fromEntries((users??[]).map(u=>[u.id,u.name]))
      const all = srs ?? []
      const byStatus={}, byPriority={}, byOwner={}, byType={}
      let totalResMs=0, resolvedCount=0
      all.forEach(s => {
        byStatus[s.status]     = (byStatus[s.status]??0)+1
        byPriority[s.priority] = (byPriority[s.priority]??0)+1
        const n = userMap[s.owner_id]??'Unknown'
        if (!byOwner[n]) byOwner[n]={open:0,closed:0,total:0}
        byOwner[n].total++
        if (s.status==='Closed') byOwner[n].closed++; else byOwner[n].open++
        byType[s.issue_type??'Other'] = (byType[s.issue_type??'Other']??0)+1
        if (s.closed_at&&s.reported_at) { totalResMs+=new Date(s.closed_at)-new Date(s.reported_at); resolvedCount++ }
      })
      const avgHours = resolvedCount>0 ? Math.round(totalResMs/resolvedCount/3600000) : null

      body.innerHTML = `
        <div class="grid-stats mb-5">
          ${statCard('Total SRs', all.length, 'var(--accent-lg)')}
          ${statCard('Open', byStatus['Open']??0, '#60A5FA')}
          ${statCard('Closed', byStatus['Closed']??0, 'var(--text-3)')}
          ${statCard('Avg Resolution', avgHours!=null?avgHours+'h':'—', 'var(--teal)')}
        </div>
        <div class="grid-2 mb-4">
          <div class="card">
            <div class="section-title mb-3">By Status</div>
            ${barChart(byStatus, ['Open','In Progress','Pending','Closed','Archived'])}
          </div>
          <div class="card">
            <div class="section-title mb-3">By Priority</div>
            ${barChart(byPriority, ['Critical','High','Medium','Low'])}
          </div>
        </div>
        <div class="card mb-4">
          <div class="section-title mb-3">By Owner</div>
          <div class="table-wrap" style="border:none">
            <table class="data-table"><thead><tr>
              <th>Name</th><th>Total</th><th>Open</th><th>Closed</th><th>Close Rate</th>
            </tr></thead><tbody>
            ${Object.entries(byOwner).sort((a,b)=>b[1].total-a[1].total).map(([name,v])=>`<tr>
              <td style="font-weight:500">${escHtml(name)}</td>
              <td>${v.total}</td>
              <td>${v.open}</td>
              <td>${v.closed}</td>
              <td><span style="font-weight:700;color:var(--teal)">${v.total>0?Math.round(v.closed/v.total*100)+'%':'—'}</span></td>
            </tr>`).join('')}
            </tbody></table>
          </div>
        </div>
        <div class="card">
          <div class="section-title mb-3">By Issue Type</div>
          ${barChart(byType, Object.keys(byType).sort((a,b)=>(byType[b]||0)-(byType[a]||0)))}
        </div>`
    } catch(e) {
      if (body) body.innerHTML = pageError('Could not load report', e.message, true, 'reports')
    }
  }

  pc.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Reports</div></div>
      <div class="page-header-actions">
        ${['7d','30d','90d','all'].map(r=>`<button class="btn ${r===range?'btn-primary':'btn-ghost'} btn-sm" id="range-btn-${r}" onclick="window.setReportRange('${r}')">${r==='all'?'All Time':r}</button>`).join('')}
      </div>
    </div>
    <div id="report-body">${skeletonPage()}</div>`

  window.setReportRange = async (r) => {
    range = r
    document.querySelectorAll('[id^="range-btn-"]').forEach(b => {
      b.className = b.id===`range-btn-${r}` ? 'btn btn-primary btn-sm' : 'btn btn-ghost btn-sm'
    })
    await loadReport()
  }
  await loadReport()
}

function barChart(data, keys) {
  const vals = keys.map(k=>data[k]??0)
  const max  = Math.max(...vals, 1)
  return `<div>${keys.filter(k=>data[k]).map(k=>`<div class="bar-row">
    <div class="bar-label">${escHtml(String(k))}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${Math.round((data[k]??0)/max*100)}%"></div></div>
    <div class="bar-val">${data[k]??0}</div>
  </div>`).join('')}</div>`
}

// ═══════════════════════════════════════════════════════════
// PAGE: SETTINGS
// ═══════════════════════════════════════════════════════════
async function pgSettings(pc) {
  pc.innerHTML = skeletonPage()
  try {
    const [{ data:driveSet }, { data:genSet }, { data:waSet }, { data:myProfile }] = await Promise.all([
      sb.from('settings').select('value').eq('key','drive').single(),
      sb.from('settings').select('value').eq('key','general').single(),
      sb.from('settings').select('value').eq('key','whatsapp').single(),
      sb.from('users').select('smtp_email,smtp_password,name').eq('id',ME.id).single(),
    ])
    const gen = genSet?.value  ?? { company_name:'', sr_prefix:'SR', timezone:'Asia/Kolkata' }
    const drv = driveSet?.value?? { sr_folder_id:'', apps_script_url:'', apps_script_token:'' }
    const wa  = waSet?.value   ?? { bridge_url:'http://localhost:3001' }

    pc.innerHTML = `
      <div class="page-header">
        <div><div class="page-title">Settings</div></div>
      </div>
      <div class="tabs">
        <button class="tab-btn active" id="tab-btn-email"    onclick="switchSettingsTab('email')">My Email</button>
        <button class="tab-btn"        id="tab-btn-general"  onclick="switchSettingsTab('general')">General</button>
        <button class="tab-btn"        id="tab-btn-drive"    onclick="switchSettingsTab('drive')">Google Drive</button>
        <button class="tab-btn"        id="tab-btn-wa"       onclick="switchSettingsTab('wa')">WhatsApp</button>
      </div>
      <div id="settings-panel"></div>`

    const panels = {
      email: `<div class="card" style="max-width:560px">
        <div class="section-title mb-2">My Email Credentials</div>
        <p style="color:var(--text-2);font-size:.8rem;margin-bottom:20px;line-height:1.6">Emails are sent from your own mailbox using the company mail server below. Each user manages their own credentials.</p>
        <div style="background:var(--bg-elevated);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:20px">
          <div class="label-xs mb-2">Company Mail Server (fixed)</div>
          <div class="flex gap-4 flex-wrap" style="font-size:.78rem;font-family:var(--mono);color:var(--text-2)">
            <span>Host: <strong style="color:var(--text-1)">smtpout.secureserver.net</strong></span>
            <span>Port: <strong style="color:var(--text-1)">465</strong></span>
            <span>SSL: <strong style="color:var(--green)">On</strong></span>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;gap:14px">
          <div class="form-group">
            <label class="form-label req">Your Email Address</label>
            <input class="form-input" id="se-email" type="email" value="${escHtml(myProfile?.smtp_email??'')}" placeholder="you@sks3d.com"/>
            <div class="form-hint">Must match your GoDaddy/company mailbox login</div>
          </div>
          <div class="form-group">
            <label class="form-label req">Your Email Password</label>
            <input class="form-input" id="se-pass" type="password" value="${escHtml(myProfile?.smtp_password??'')}" placeholder="••••••••"/>
            <div class="form-hint">Your mailbox password — stored in your profile only</div>
          </div>
        </div>
        <div class="flex items-center gap-3 mt-4 flex-wrap">
          <button class="btn btn-primary" onclick="window.saveEmailCreds()">Save My Email</button>
          <button class="btn btn-secondary" onclick="window.testEmail()">Send Test Email</button>
          <div id="email-creds-msg" style="font-size:.8rem"></div>
        </div>
      </div>`,

      general: `<div class="card" style="max-width:560px">
        <div class="section-title mb-4">General Settings</div>
        <div style="display:flex;flex-direction:column;gap:14px">
          <div class="form-group">
            <label class="form-label">Company / System Name</label>
            <input class="form-input" id="sg-company" value="${escHtml(gen.company_name??'')}"/>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">SR Number Prefix</label>
              <input class="form-input" id="sg-prefix" value="${escHtml(gen.sr_prefix??'SR')}" placeholder="SR"/>
              <div class="form-hint">e.g. SR → SR-2026-0001</div>
            </div>
            <div class="form-group">
              <label class="form-label">Timezone</label>
              <select class="form-select" id="sg-tz">
                ${['Asia/Kolkata','Asia/Dubai','UTC','America/New_York','Europe/London'].map(tz=>`<option ${tz===gen.timezone?'selected':''}>${tz}</option>`).join('')}
              </select>
            </div>
          </div>
        </div>
        <div class="flex items-center gap-3 mt-4">
          <button class="btn btn-primary" onclick="window.saveGeneral()">Save General</button>
          <div id="gen-msg" style="font-size:.8rem"></div>
        </div>
      </div>`,

      drive: `<div class="card" style="max-width:560px">
        <div class="section-title mb-2">Google Drive & Apps Script</div>
        <p style="color:var(--text-2);font-size:.8rem;margin-bottom:18px;line-height:1.6">Configure folder IDs and Apps Script bridge for Drive and Sheets integration.</p>
        <div style="display:flex;flex-direction:column;gap:14px">
          <div class="form-group">
            <label class="form-label">SR Folder ID</label>
            <input class="form-input" id="sd-folder" value="${escHtml(drv.sr_folder_id??'')}" placeholder="Google Drive folder ID"/>
            <div class="form-hint">From the Drive URL: drive.google.com/drive/folders/<strong>THIS_PART</strong></div>
          </div>
          <div class="form-group">
            <label class="form-label">Apps Script Web App URL</label>
            <input class="form-input" id="sd-url" value="${escHtml(drv.apps_script_url??'')}" placeholder="https://script.google.com/macros/s/…/exec"/>
          </div>
          <div class="form-group">
            <label class="form-label">Apps Script Token</label>
            <input class="form-input" id="sd-token" type="password" value="${escHtml(drv.apps_script_token??'')}" placeholder="Secret token matching Code.gs"/>
          </div>
        </div>
        <div class="flex items-center gap-3 mt-4 flex-wrap">
          <button class="btn btn-primary" onclick="window.saveDrive()">Save Drive Settings</button>
          <button class="btn btn-secondary" onclick="window.testDrive()">Test Connection</button>
          <div id="drive-msg" style="font-size:.8rem"></div>
        </div>
      </div>`,

      wa: `<div class="card" style="max-width:560px">
        <div class="section-title mb-2">WhatsApp Bridge</div>
        <p style="color:var(--text-2);font-size:.8rem;margin-bottom:18px;line-height:1.6">The WhatsApp bridge is a separate service (wa-service/bridge.js). Enter its URL here.</p>
        <div class="form-group">
          <label class="form-label">Bridge URL</label>
          <input class="form-input" id="sw-url" value="${escHtml(wa.bridge_url??'http://localhost:3001')}" placeholder="http://localhost:3001"/>
        </div>
        <div class="alert alert-info mt-3">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01" stroke-linecap="round"/></svg>
          <div>Start: <code style="font-family:var(--mono);background:rgba(0,0,0,.3);padding:1px 6px;border-radius:3px;font-size:.75rem">cd wa-service && node bridge.js</code></div>
        </div>
        <div class="flex items-center gap-3 mt-4">
          <button class="btn btn-primary" onclick="window.saveWA()">Save WhatsApp Settings</button>
          <div id="wa-msg" style="font-size:.8rem"></div>
        </div>
      </div>`,
    }

    window.switchSettingsTab = (t) => {
      document.querySelectorAll('[id^="tab-btn-"]').forEach(b => b.classList.toggle('active', b.id===`tab-btn-${t}`))
      document.getElementById('settings-panel').innerHTML = panels[t] || ''
    }
    window.saveEmailCreds = async () => {
      const em = document.getElementById('se-email')?.value?.trim()
      const pw = document.getElementById('se-pass')?.value
      const el = document.getElementById('email-creds-msg')
      const { error } = await sb.from('users').update({ smtp_email:em, smtp_password:pw }).eq('id', ME.id)
      if (!error) { ME.smtp_email=em }
      if (el) { el.textContent=error?`✗ ${error.message}`:'✓ Saved'; el.style.color=error?'var(--red)':'var(--green)' }
    }
    window.testEmail = async () => {
      const em = document.getElementById('se-email')?.value?.trim()
      const pw = document.getElementById('se-pass')?.value
      const el = document.getElementById('email-creds-msg')
      if (el) { el.textContent='Sending test…'; el.style.color='var(--text-3)' }
      await sb.from('users').update({ smtp_email:em, smtp_password:pw }).eq('id', ME.id)
      try {
        await smtpSend({ host:CFG.smtpHost, port:CFG.smtpPort, username:em, password:pw, to:em, from:em, subject:'SR Platform — Test Email', body:'Your email credentials are configured correctly.' })
        if (el) { el.textContent=`✓ Test sent to ${em}`; el.style.color='var(--green)' }
      } catch(e) {
        if (el) { el.textContent='✗ Error: '+e.message; el.style.color='var(--red)' }
      }
    }
    window.saveGeneral = async () => {
      await sb.from('settings').upsert({ key:'general', value:{ company_name:document.getElementById('sg-company')?.value, sr_prefix:document.getElementById('sg-prefix')?.value, timezone:document.getElementById('sg-tz')?.value }, updated_by:ME.id })
      const el=document.getElementById('gen-msg'); if(el){el.textContent='✓ Saved';el.style.color='var(--green)';setTimeout(()=>el.textContent='',3000)}
    }
    window.saveDrive = async () => {
      const url   = document.getElementById('sd-url')?.value?.trim()
      const token = document.getElementById('sd-token')?.value
      await sb.from('settings').upsert({ key:'drive', value:{ sr_folder_id:document.getElementById('sd-folder')?.value, apps_script_url:url, apps_script_token:token }, updated_by:ME.id })
      CFG.appsScriptUrl = url; CFG.appsScriptToken = token
      const el=document.getElementById('drive-msg'); if(el){el.textContent='✓ Saved';el.style.color='var(--green)';setTimeout(()=>el.textContent='',3000)}
    }
    window.testDrive = async () => {
      const url = document.getElementById('sd-url')?.value?.trim()
      const el  = document.getElementById('drive-msg')
      if (el) { el.textContent='Testing…'; el.style.color='var(--text-3)' }
      try {
        const r = await fetch(url,{signal:AbortSignal.timeout(5000)})
        const d = await r.json()
        if (el) { el.textContent=d.ok?'✓ Connected!':'✗ '+d.error; el.style.color=d.ok?'var(--green)':'var(--red)' }
      } catch { if (el) { el.textContent='✗ Could not reach URL'; el.style.color='var(--red)' } }
    }
    window.saveWA = async () => {
      const url = document.getElementById('sw-url')?.value?.trim()
      await sb.from('settings').upsert({ key:'whatsapp', value:{ bridge_url:url }, updated_by:ME.id })
      CFG.waBridgeUrl = url
      const el=document.getElementById('wa-msg'); if(el){el.textContent='✓ Saved';el.style.color='var(--green)';setTimeout(()=>el.textContent='',3000)}
    }

    window.switchSettingsTab('email')
  } catch(e) {
    pc.innerHTML = pageError('Could not load settings', e.message, true, 'settings')
  }
}
</script>
