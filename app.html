<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SR Platform</title>
<link rel="icon" href="data:,"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html { font-size:14px; -webkit-text-size-adjust:100% }
:root {
  --bg: #070B14; --bg-surface: #0A0F1C; --bg-elevated: #0F1623;
  --bg-card: #131929; --bg-hover: #1A2238; --bg-active: #1E2940;
  --border: rgba(255,255,255,0.05); --border-md: rgba(255,255,255,0.08); --border-lg: rgba(255,255,255,0.12);
  --text-1: #F0F4FF; --text-2: #8B95B0; --text-3: #4A5268; --text-inv: #070B14;
  --accent: #3B82F6; --accent-dim: rgba(59,130,246,0.08); --accent-glow: rgba(59,130,246,0.15);
  --accent-h: #2563EB; --accent-lg: #60A5FA;
  --teal: #14B8A6; --teal-dim: rgba(20,184,166,0.08);
  --green: #10B981; --green-dim: rgba(16,185,129,0.1);
  --yellow: #F59E0B; --yellow-dim: rgba(245,158,11,0.1);
  --red: #EF4444; --red-dim: rgba(239,68,68,0.1);
  --orange: #F97316; --purple: #8B5CF6; --purple-dim: rgba(139,92,246,0.1);
  --font: 'Plus Jakarta Sans', system-ui, sans-serif;
  --mono: 'JetBrains Mono', 'Courier New', monospace;
  --r-xs: 4px; --r-sm: 6px; --r: 8px; --r-md: 10px; --r-lg: 14px; --r-xl: 18px; --r-2xl: 24px;
  --sidebar-w: 232px; --header-h: 60px;
  --ease: cubic-bezier(0.16, 1, 0.3, 1); --ease-in: cubic-bezier(0.4, 0, 1, 1);
  --t: 200ms; --t-md: 300ms;
}
body {
  font-family: var(--font); background: var(--bg); color: var(--text-1);
  line-height: 1.55; -webkit-font-smoothing: antialiased; min-height: 100vh; overflow-x: hidden;
}
::selection { background: var(--accent); color: #fff }
::-webkit-scrollbar { width:5px; height:5px }
::-webkit-scrollbar-track { background: transparent }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius:3px }
a { color:inherit; text-decoration:none }
button, select, input, textarea { font-family: var(--font) }
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 1000; opacity: 0.4;
}

/* Auth Screen */
#auth-screen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; position:relative }
#auth-screen::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(ellipse 80% 60% at 20% 30%, rgba(59,130,246,0.06) 0%, transparent 60%),
             radial-gradient(ellipse 60% 80% at 80% 70%, rgba(20,184,166,0.05) 0%, transparent 60%);
  pointer-events: none;
}
#auth-screen::after {
  content: ''; position: fixed; inset: 0;
  background-image: linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                   linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 64px 64px; pointer-events: none;
}
.auth-wrap { position:relative; z-index:2; width:100%; max-width:400px; animation:slideUp .5s var(--ease) both }
.auth-brand { text-align:center; margin-bottom:36px }
.auth-logo-icon {
  display:inline-flex; align-items:center; justify-content:center; width:56px; height:56px;
  border-radius:16px; background:linear-gradient(135deg,var(--accent),var(--teal)); margin-bottom:16px;
  box-shadow:0 0 40px rgba(59,130,246,.25),0 0 0 1px rgba(59,130,246,.2);
}
.auth-brand-name {
  font-size:1.5rem; font-weight:800; letter-spacing:-0.03em;
  background:linear-gradient(135deg,#F0F4FF,#8B95B0); -webkit-background-clip:text;
  -webkit-text-fill-color:transparent; background-clip:text;
}
.auth-brand-sub { font-size:.7rem; color:var(--text-3); letter-spacing:.14em; text-transform:uppercase; margin-top:4px }
.auth-card {
  background:var(--bg-card); border:1px solid var(--border-md); border-radius:var(--r-xl);
  padding:28px; box-shadow:0 24px 64px rgba(0,0,0,.4); backdrop-filter:blur(12px);
}
.auth-card h3 { font-size:1rem; font-weight:700; margin-bottom:22px; color:var(--text-1) }
.auth-note { text-align:center; margin-top:20px; font-size:.7rem; color:var(--text-3) }

/* App Shell */
.app-shell { display:flex; height:100vh; overflow:hidden }

/* Sidebar */
.app-sidebar {
  width:var(--sidebar-w); flex-shrink:0; background:var(--bg-surface);
  border-right:1px solid var(--border); display:flex; flex-direction:column;
  overflow-y:auto; overflow-x:hidden; position:relative;
}
.app-sidebar::after {
  content:''; position:absolute; top:0; right:0; width:1px; height:100%;
  background:linear-gradient(to bottom,transparent,rgba(59,130,246,.15) 30%,rgba(59,130,246,.15) 70%,transparent);
  pointer-events:none;
}
.sidebar-logo { padding:18px 16px 14px; border-bottom:1px solid var(--border); flex-shrink:0 }
.sidebar-logo-inner { display:flex; align-items:center; gap:10px }
.sidebar-logo-icon {
  width:32px; height:32px; border-radius:9px; background:linear-gradient(135deg,var(--accent),var(--teal));
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  box-shadow:0 0 16px rgba(59,130,246,.3);
}
.sidebar-logo-text { font-weight:800; font-size:1rem; letter-spacing:-0.02em }
.sidebar-logo-sub { font-size:.62rem; color:var(--text-3); letter-spacing:.12em; text-transform:uppercase; margin-top:1px }
.sidebar-nav { padding:10px 8px; flex:1 }
.sidebar-section-label {
  font-size:.62rem; font-weight:700; letter-spacing:.12em; text-transform:uppercase;
  color:var(--text-3); padding:10px 10px 5px; margin-top:4px;
}
.sidebar-link {
  display:flex; align-items:center; gap:9px; padding:8px 10px; border-radius:var(--r);
  color:var(--text-2); font-size:.83rem; font-weight:500;
  transition:all var(--t) var(--ease); cursor:pointer; border:none; background:none;
  width:100%; text-align:left; position:relative; margin-bottom:1px;
}
.sidebar-link:hover { background:var(--bg-hover); color:var(--text-1) }
.sidebar-link.active { background:var(--accent-dim); color:var(--accent-lg); font-weight:600 }
.sidebar-link.active::before {
  content:''; position:absolute; left:0; top:4px; bottom:4px; width:3px;
  background:var(--accent); border-radius:0 3px 3px 0;
}
.sidebar-link svg { width:15px; height:15px; flex-shrink:0; stroke-width:1.75; opacity:.7; transition:opacity var(--t) }
.sidebar-link:hover svg, .sidebar-link.active svg { opacity:1 }
.sidebar-footer { padding:10px 8px 14px; border-top:1px solid var(--border); flex-shrink:0 }
.sidebar-user-info { padding:8px 10px 6px; font-size:.78rem; color:var(--text-2); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }

/* Main */
.app-main { flex:1; display:flex; flex-direction:column; overflow:hidden }
.app-header {
  height:var(--header-h); flex-shrink:0; background:var(--bg-surface);
  border-bottom:1px solid var(--border); display:flex; align-items:center;
  padding:0 24px; gap:12px;
}
.breadcrumb { display:flex; align-items:center; gap:6px; font-size:.78rem }
.breadcrumb-sep { color:var(--text-3) }
.breadcrumb-root { color:var(--text-3) }
.breadcrumb-page { font-weight:600; color:var(--text-1) }
.header-right { margin-left:auto; display:flex; align-items:center; gap:12px }
.header-status { display:flex; align-items:center; gap:6px; font-size:.78rem; color:var(--text-2) }
.status-dot { width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); flex-shrink:0 }
.page-content { flex:1; overflow-y:auto; padding:24px }

/* Typography */
.page-title { font-size:1.35rem; font-weight:800; letter-spacing:-0.02em }
.page-subtitle { font-size:.78rem; color:var(--text-2); margin-top:2px }
.section-title { font-size:.95rem; font-weight:700; letter-spacing:-0.01em }
.label-xs { font-size:.62rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--text-2) }
.mono { font-family:var(--mono) }
.text-accent { color:var(--accent-lg) }
.text-muted { color:var(--text-2) }
.text-dim { color:var(--text-3) }
.text-green { color:var(--green) }
.text-red { color:var(--red) }
.text-yellow { color:var(--yellow) }

/* Cards */
.card { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r-lg); padding:18px; transition:border-color var(--t),box-shadow var(--t) }
.card:hover { border-color:var(--border-md) }
.card-sm { padding:14px }
.card-lg { padding:24px }
.card-interactive:hover { border-color:var(--border-lg); box-shadow:0 8px 32px rgba(0,0,0,.3); transform:translateY(-1px) }
.card-interactive { cursor:pointer; transition:all var(--t) var(--ease) }

/* Stat Cards */
.stat-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:var(--r-lg);
  padding:18px 20px; position:relative; overflow:hidden; transition:all var(--t) var(--ease);
}
.stat-card:hover { border-color:var(--border-md); transform:translateY(-2px); box-shadow:0 12px 32px rgba(0,0,0,.3) }
.stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:var(--_ac,var(--accent)); opacity:.8 }
.stat-card::after { content:''; position:absolute; top:2px; right:0; width:60px; height:60px; border-radius:0 var(--r-lg) 0 60px; background:var(--_ac,var(--accent)); opacity:.04 }
.stat-value { font-family:var(--font); font-size:1.9rem; font-weight:800; color:var(--_ac,var(--accent-lg)); line-height:1; letter-spacing:-0.04em; margin-bottom:4px }
.stat-label { font-size:.68rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--text-3) }

/* Grids */
.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px }
.grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:16px }
.grid-4 { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:14px }
.grid-stats { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px }

/* Page Header */
.page-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:22px; gap:16px }
.page-header-actions { display:flex; gap:8px; flex-wrap:wrap; flex-shrink:0; align-items:center }

/* Buttons */
.btn {
  display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:var(--r);
  font-size:.83rem; font-weight:600; cursor:pointer; border:1px solid transparent;
  transition:all var(--t) var(--ease); white-space:nowrap; text-decoration:none;
  line-height:1; position:relative; overflow:hidden;
}
.btn::after { content:''; position:absolute; inset:0; background:rgba(255,255,255,0); transition:background var(--t) }
.btn:hover::after { background:rgba(255,255,255,.04) }
.btn:active { transform:scale(.97) }
.btn:disabled { opacity:.45; cursor:not-allowed; transform:none!important }
.btn-primary { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 2px 8px rgba(59,130,246,.25) }
.btn-primary:hover:not(:disabled) { background:var(--accent-h); border-color:var(--accent-h); box-shadow:0 4px 16px rgba(59,130,246,.35); transform:translateY(-1px) }
.btn-secondary { background:var(--bg-elevated); color:var(--text-1); border-color:var(--border-lg) }
.btn-secondary:hover:not(:disabled) { background:var(--bg-hover); border-color:var(--border-lg); transform:translateY(-1px) }
.btn-ghost { background:transparent; color:var(--text-2); border-color:transparent }
.btn-ghost:hover:not(:disabled) { background:var(--bg-hover); color:var(--text-1) }
.btn-danger { background:rgba(239,68,68,.1); color:var(--red); border-color:rgba(239,68,68,.2) }
.btn-danger:hover:not(:disabled) { background:rgba(239,68,68,.18); border-color:rgba(239,68,68,.35) }
.btn-success { background:rgba(16,185,129,.1); color:var(--green); border-color:rgba(16,185,129,.2) }
.btn-sm { padding:5px 10px; font-size:.77rem }
.btn-lg { padding:11px 22px; font-size:.95rem }
.btn-icon { padding:7px; min-width:32px; justify-content:center }
.btn-icon.btn-sm { padding:5px; min-width:26px }
.btn svg { width:13px; height:13px; flex-shrink:0 }
.btn-spinner { width:12px; height:12px; border:2px solid rgba(255,255,255,.25); border-top-color:currentColor; border-radius:50%; animation:spin .65s linear infinite; display:inline-block }

/* Forms */
.form-group { display:flex; flex-direction:column; gap:6px }
.form-label { font-size:.73rem; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--text-2) }
.form-label.req::after { content:' *'; color:var(--red); font-weight:400 }
.form-input,.form-select,.form-textarea {
  background:var(--bg-elevated); border:1px solid var(--border-md); border-radius:var(--r);
  padding:9px 12px; font-size:.875rem; color:var(--text-1); width:100%;
  transition:border-color var(--t),box-shadow var(--t),background var(--t); outline:none; -webkit-appearance:none;
}
.form-input:focus,.form-select:focus,.form-textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); background:var(--bg-card) }
.form-input::placeholder,.form-textarea::placeholder { color:var(--text-3) }
.form-textarea { resize:vertical; min-height:90px; line-height:1.6 }
.form-select { cursor:pointer }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:14px }
.form-row-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px }
.form-hint { font-size:.73rem; color:var(--text-3); line-height:1.4 }
.form-error { font-size:.73rem; color:var(--red) }

/* Toggle */
.toggle-wrap { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; background:var(--bg-elevated); border:1px solid var(--border-md); border-radius:var(--r); cursor:pointer }
.toggle-wrap:hover { border-color:var(--border-lg) }
.toggle-info { flex:1 }
.toggle-title { font-size:.85rem; font-weight:600; color:var(--text-1) }
.toggle-desc { font-size:.75rem; color:var(--text-2); margin-top:2px }
.toggle-switch { width:38px; height:22px; background:var(--bg-hover); border:1px solid var(--border-lg); border-radius:11px; position:relative; transition:all var(--t) var(--ease); flex-shrink:0; margin-left:12px }
.toggle-switch::after { content:''; position:absolute; width:16px; height:16px; background:var(--text-3); border-radius:50%; top:2px; left:2px; transition:all var(--t) var(--ease) }
.toggle-switch.on { background:var(--accent); border-color:var(--accent) }
.toggle-switch.on::after { background:#fff; transform:translateX(16px) }

/* Badges */
.badge { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:20px; font-size:.68rem; font-weight:700; letter-spacing:.04em; white-space:nowrap; border:1px solid transparent }
.badge-dot { width:5px; height:5px; border-radius:50%; background:currentColor; flex-shrink:0 }
.badge-low { background:rgba(107,114,128,.1); color:#9CA3AF; border-color:rgba(107,114,128,.18) }
.badge-medium { background:rgba(245,158,11,.1); color:var(--yellow); border-color:rgba(245,158,11,.2) }
.badge-high { background:rgba(239,68,68,.1); color:#F87171; border-color:rgba(239,68,68,.2) }
.badge-critical { background:rgba(239,68,68,.18); color:#FCA5A5; border-color:rgba(239,68,68,.35) }
.badge-open { background:rgba(59,130,246,.1); color:var(--accent-lg); border-color:rgba(59,130,246,.2) }
.badge-in-progress { background:rgba(16,185,129,.1); color:var(--green); border-color:rgba(16,185,129,.2) }
.badge-pending { background:rgba(245,158,11,.1); color:var(--yellow); border-color:rgba(245,158,11,.2) }
.badge-closed { background:rgba(107,114,128,.1); color:#9CA3AF; border-color:rgba(107,114,128,.18) }
.badge-archived { background:rgba(55,65,81,.2); color:#6B7280; border-color:rgba(55,65,81,.3) }
.badge-admin { background:rgba(139,92,246,.1); color:#C084FC; border-color:rgba(139,92,246,.2) }
.badge-manager { background:rgba(16,185,129,.1); color:var(--green); border-color:rgba(16,185,129,.2) }
.badge-technical { background:rgba(59,130,246,.1); color:var(--accent-lg); border-color:rgba(59,130,246,.2) }
.badge-user { background:rgba(255,255,255,.05); color:var(--text-2); border-color:var(--border) }
.badge-viewer { background:rgba(55,65,81,.15); color:#6B7280; border-color:rgba(55,65,81,.25) }
.badge-sent { background:rgba(16,185,129,.12); color:var(--green); border-color:rgba(16,185,129,.25) }
.badge-failed { background:rgba(239,68,68,.12); color:#EF4444; border-color:rgba(239,68,68,.25) }
.badge-scheduled { background:rgba(59,130,246,.12); color:var(--accent-lg); border-color:rgba(59,130,246,.25) }
.badge-not-sent { background:rgba(107,114,128,.1); color:#6B7280; border-color:rgba(107,114,128,.2) }

/* Table */
.table-wrap { overflow-x:auto; border-radius:var(--r-lg); border:1px solid var(--border) }
.data-table { width:100%; border-collapse:collapse; font-size:.83rem }
.data-table th { text-align:left; font-size:.63rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--text-3); padding:10px 14px; border-bottom:1px solid var(--border); white-space:nowrap; background:var(--bg-surface) }
.data-table td { padding:11px 14px; border-bottom:1px solid var(--border); color:var(--text-1); vertical-align:middle }
.data-table tbody tr { transition:background var(--t); cursor:pointer }
.data-table tbody tr:hover { background:var(--bg-hover) }
.data-table tbody tr:last-child td { border-bottom:none }

/* Tabs */
.tabs { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:20px }
.tab-btn { padding:10px 16px; font-size:.83rem; font-weight:500; color:var(--text-2); background:none; border:none; border-bottom:2px solid transparent; margin-bottom:-1px; cursor:pointer; transition:all var(--t); font-family:var(--font); white-space:nowrap }
.tab-btn:hover { color:var(--text-1) }
.tab-btn.active { color:var(--accent-lg); border-bottom-color:var(--accent); font-weight:600 }

/* Alerts */
.alert { display:flex; align-items:flex-start; gap:10px; padding:12px 14px; border-radius:var(--r); font-size:.83rem; border:1px solid transparent; line-height:1.5 }
.alert-success { background:rgba(16,185,129,.08); border-color:rgba(16,185,129,.2); color:var(--green) }
.alert-error { background:rgba(239,68,68,.08); border-color:rgba(239,68,68,.2); color:var(--red) }
.alert-warning { background:rgba(245,158,11,.08); border-color:rgba(245,158,11,.2); color:var(--yellow) }
.alert-info { background:rgba(59,130,246,.08); border-color:rgba(59,130,246,.2); color:var(--accent-lg) }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(5,8,16,.7); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); z-index:500; display:flex; align-items:center; justify-content:center; padding:20px; animation:fadeIn 180ms var(--ease) }
.modal { background:var(--bg-card); border:1px solid var(--border-md); border-radius:var(--r-xl); width:100%; max-width:580px; max-height:92vh; overflow-y:auto; animation:slideUp 280ms var(--ease); box-shadow:0 24px 80px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04) inset }
.modal-lg { max-width:760px }
.modal-sm { max-width:420px }
.modal-header { padding:22px 24px 0; display:flex; align-items:flex-start; justify-content:space-between; gap:12px }
.modal-title { font-size:1.05rem; font-weight:700; letter-spacing:-0.01em }
.modal-body { padding:20px 24px; display:flex; flex-direction:column; gap:14px }
.modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:8px }
.modal-tabs { display:flex; border-bottom:1px solid var(--border); padding:0 24px }

/* Filter */
.filter-bar { display:flex; align-items:center; gap:8px; margin-bottom:16px; flex-wrap:wrap }
.search-wrap { position:relative; flex:1; min-width:200px }
.search-wrap svg { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text-3); pointer-events:none; width:14px; height:14px }
.search-wrap input { padding-left:34px }

/* Step Progress */
.step-dot { width:26px; height:26px; border-radius:50%; border:2px solid var(--border-lg); background:var(--bg-elevated); display:flex; align-items:center; justify-content:center; font-size:.65rem; font-weight:700; color:var(--text-3); flex-shrink:0; transition:all var(--t) var(--ease) }
.step-dot.done { background:var(--accent); border-color:var(--accent); color:#fff; box-shadow:0 0 12px rgba(59,130,246,.35) }
@keyframes pulse-ring { 0%{box-shadow:0 0 0 0 rgba(59,130,246,.4),0 0 12px rgba(59,130,246,.2)} 70%{box-shadow:0 0 0 8px rgba(59,130,246,0),0 0 12px rgba(59,130,246,.2)} 100%{box-shadow:0 0 0 0 rgba(59,130,246,0),0 0 12px rgba(59,130,246,.2)} }
.step-dot.current { border-color:var(--accent); color:var(--accent-lg); background:var(--accent-dim); animation:pulse-ring 2s cubic-bezier(.25,0,0,1) infinite }
.step-connector { height:2px; flex:1; background:var(--border-md); min-width:20px; border-radius:1px }
.step-connector.done { background:var(--accent) }

/* Email Log Card */
.email-log-card { padding:14px 16px; background:var(--bg-elevated); border:1px solid var(--border); border-radius:var(--r-md); transition:border-color var(--t) }
.email-log-card:hover { border-color:var(--border-md) }
.email-log-card.status-sent { border-left:3px solid var(--green) }
.email-log-card.status-failed { border-left:3px solid var(--red) }
.email-log-card.status-scheduled { border-left:3px solid var(--accent) }
.email-log-card.status-not-sent { border-left:3px solid var(--text-3) }

/* Empty & Error */
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:64px 24px; text-align:center }
.empty-icon { width:52px; height:52px; border-radius:var(--r-lg); background:var(--bg-elevated); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; color:var(--text-3) }
.empty-title { font-weight:700; color:var(--text-2); font-size:.95rem }
.empty-desc { font-size:.8rem; color:var(--text-3); max-width:280px; line-height:1.6 }
.page-error { display:flex; flex-direction:column; align-items:center; gap:12px; padding:60px 20px; text-align:center }

/* Skeleton */
@keyframes shimmer { 0%{background-position:-600px 0} 100%{background-position:600px 0} }
.sk { background:linear-gradient(90deg,var(--bg-elevated) 25%,var(--bg-hover) 50%,var(--bg-elevated) 75%); background-size:600px 100%; animation:shimmer 1.4s ease infinite; border-radius:var(--r) }
.sk-h { height:24px; margin-bottom:4px }
.sk-sm { height:14px }
.sk-btn { height:34px; width:96px; border-radius:var(--r) }
.sk-stat { height:80px; border-radius:var(--r-lg) }
.sk-row { height:44px; margin-bottom:3px; border-radius:var(--r-sm) }
.sk-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; margin-bottom:20px }

/* Toast */
#toast-root { position:fixed; bottom:24px; right:24px; z-index:9999; display:flex; flex-direction:column; gap:8px; pointer-events:none }
.toast { pointer-events:all; display:flex; align-items:center; gap:10px; padding:12px 16px; border-radius:var(--r-lg); font-size:.83rem; font-weight:500; box-shadow:0 8px 32px rgba(0,0,0,.5); animation:slideUpFade .22s var(--ease); border:1px solid transparent; min-width:240px; max-width:380px; backdrop-filter:blur(12px) }
.toast-icon { font-size:.9rem; flex-shrink:0 }
.toast-success { background:rgba(10,20,16,.95); border-color:rgba(16,185,129,.3); color:var(--green) }
.toast-error { background:rgba(20,10,10,.95); border-color:rgba(239,68,68,.3); color:#EF4444 }
.toast-info { background:rgba(10,14,22,.95); border-color:rgba(59,130,246,.3); color:var(--accent-lg) }
.toast-warning { background:rgba(20,16,10,.95); border-color:rgba(245,158,11,.3); color:var(--yellow) }

/* Detail Row */
.detail-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); gap:12px }
.detail-row:last-child { border-bottom:none }
.detail-label { font-size:.78rem; color:var(--text-2); flex-shrink:0 }
.detail-value { font-size:.83rem; font-weight:500; text-align:right }

/* Placeholder Tags */
.placeholder-tag { display:inline-flex; align-items:center; padding:3px 8px; background:var(--accent-dim); border:1px solid rgba(59,130,246,.2); border-radius:var(--r-sm); font-size:.72rem; font-family:var(--mono); color:var(--accent-lg); cursor:pointer; transition:all var(--t); user-select:none }
.placeholder-tag:hover { background:var(--accent-glow); border-color:rgba(59,130,246,.35); transform:translateY(-1px) }

/* Bar Chart */
.bar-row { display:flex; align-items:center; gap:10px; margin-bottom:8px }
.bar-label { width:130px; font-size:.78rem; color:var(--text-2); text-align:right; flex-shrink:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
.bar-track { flex:1; height:20px; background:var(--bg-elevated); border-radius:4px; overflow:hidden }
.bar-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--teal)); border-radius:4px; min-width:4px; transition:width .6s var(--ease) }
.bar-val { width:32px; font-size:.78rem; font-weight:700; color:var(--text-1); text-align:right }

/* Utilities */
.flex { display:flex }
.flex-col { flex-direction:column }
.items-center { align-items:center }
.items-start { align-items:flex-start }
.justify-between { justify-content:space-between }
.justify-center { justify-content:center }
.gap-1 { gap:4px }
.gap-2 { gap:8px }
.gap-3 { gap:12px }
.gap-4 { gap:16px }
.gap-5 { gap:20px }
.flex-1 { flex:1 }
.w-full { width:100% }
.ml-auto { margin-left:auto }
.mt-auto { margin-top:auto }
.mb-2 { margin-bottom:8px }
.mb-3 { margin-bottom:12px }
.mb-4 { margin-bottom:16px }
.mb-5 { margin-bottom:20px }
.mt-2 { margin-top:8px }
.mt-3 { margin-top:12px }
.truncate { overflow:hidden; text-overflow:ellipsis; white-space:nowrap }
.hidden { display:none!important }
.divide-y>*+* { border-top:1px solid var(--border) }

/* Animations */
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes slideUp { from{opacity:0;transform:translateY(14px) scale(.98)} to{opacity:1;transform:translateY(0) scale(1)} }
@keyframes slideUpFade { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes fadeInUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.anim-in { animation:fadeInUp .3s var(--ease) both }

.section-divider { height:1px; background:var(--border); margin:16px 0 }

/* Responsive */
@media (max-width:768px) {
  :root { --sidebar-w:200px }
  .grid-2,.grid-3 { grid-template-columns:1fr }
  .form-row,.form-row-3 { grid-template-columns:1fr }
  .page-header { flex-direction:column; align-items:stretch }
  .page-header-actions { flex-wrap:wrap }
}
@media (max-width:600px) {
  .app-sidebar { display:none }
  .page-content { padding:16px }
  .app-header { padding:0 16px }
}

<script type="module">
import { initSupabase, getSupabase, withTimeout } from './services/supabase.js'
import { appState } from './services/app-state.js'
import { checkSession, doLogin as authLogin, doLogout as authLogout, loadProfile } from './services/auth.js'
import { navigate as routerNavigate, initRouter, getPageTitle, getCurrentRoute, onRouteChange } from './services/router.js'
import { initializeConfig, loadRuntimeConfig, CFG } from './utils/config.js'
import { auditLog } from './services/audit.js'
import { smtpSend } from './services/email.js'
import { createDriveFolder } from './services/sheets.js'
import { escHtml } from './utils/format.js'
import { toast } from './components/toast.js'
import { modal, closeModalForce } from './components/modal.js'

window.navigate = routerNavigate
window.retryPage = (page) => routerNavigate(page)
window.toast = toast
window.modal = modal
window.closeModalForce = closeModalForce
window.appState = appState
window.auditLog = auditLog
window.smtpSend = smtpSend
window.createDriveFolder = createDriveFolder

let unsubscribeAuth = null

function showAuth() {
  document.getElementById('auth-screen').classList.remove('hidden')
  document.getElementById('app-shell').classList.add('hidden')
}

function showApp() {
  document.getElementById('auth-screen').classList.add('hidden')
  document.getElementById('app-shell').classList.remove('hidden')
}

function updateSidebar(page) {
  document.querySelectorAll('.sidebar-link').forEach(l => {
    const id = l.id
    const isActive = id === `nav-${page}` || (page.startsWith('sr') && id === 'nav-sr')
    l.classList.toggle('active', isActive)
  })
  document.getElementById('breadcrumb').textContent = getPageTitle(page)
}

async function bootApp() {
  const ok = await initializeConfig()
  if (!ok) { showAuth(); return }

  await initSupabase()

  const sessionUser = await checkSession()
  if (sessionUser) {
    try {
      await loadProfile(sessionUser.id)
      await loadRuntimeConfig()
      showApp()
      initRouter()
    } catch(e) {
      showAuth()
    }
  } else {
    showAuth()
  }

  unsubscribeAuth = getSupabase().auth.onAuthStateChange(async (event, session) => {
    if (session?.user) {
      try {
        await loadProfile(session.user.id)
        await loadRuntimeConfig()
        showApp()
        initRouter()
      } catch(e) {
        showAuth()
      }
    } else if (event === 'SIGNED_OUT') {
      appState.set('user', null)
      showAuth()
    }
  })
}

onRouteChange(({ page, params }) => {
  updateSidebar(page)
  const me = appState.get('user')
  if (me) {
    document.getElementById('sidebar-user').textContent = me.name ?? me.email
    document.getElementById('header-user').textContent = me.name ?? me.email
    const adminSection = document.getElementById('admin-section')
    const adminLabel = document.getElementById('admin-section-label')
    if (!['Admin','Manager'].includes(me.role)) {
      if (adminSection) adminSection.classList.add('hidden')
      if (adminLabel) adminLabel.classList.add('hidden')
    } else {
      if (adminSection) adminSection.classList.remove('hidden')
      if (adminLabel) adminLabel.classList.remove('hidden')
    }
  }
})

window.doLogin = async () => {
  const email = document.getElementById('login-email').value.trim()
  const pass = document.getElementById('login-pass').value
  const btn = document.getElementById('login-btn')
  const err = document.getElementById('login-error')
  err.classList.add('hidden')
  btn.disabled = true
  btn.innerHTML = '<span class="btn-spinner"></span> Signing in\u2026'
  try {
    const user = await authLogin(email, pass)
    if (user) {
      await loadRuntimeConfig()
      showApp()
      initRouter()
    }
  } catch(e) {
    err.textContent = e.message.includes('Invalid') ? 'Invalid email or password.' : e.message
    err.classList.remove('hidden')
    btn.disabled = false
    btn.innerHTML = 'Sign In'
  }
}

window.doLogout = async () => {
  const me = appState.get('user')
  if (me) {
    await withTimeout(auditLog('LOGOUT', me.id, 'user', 'User logged out', {}), 5000, 'Logout audit timeout').catch(()=>{})
  }
  await authLogout()
  window.location.href = 'login.html'
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('auth-screen').classList.contains('hidden')) {
    window.doLogin()
  }
})

appState.on('user', (user) => {
  if (user) {
    document.getElementById('sidebar-user').textContent = user.name ?? user.email
    document.getElementById('header-user').textContent = user.name ?? user.email
  }
})

const _origError = console.error
console.error = function(...args) {
  _origError.apply(console, args)
  const msg = args.map(a => typeof a === 'string' ? a : JSON.stringify(a)).join(' ')
  const log = appState.get('errorLog') || []
  log.push({ time: new Date().toISOString(), msg, source: 'console.error' })
  if (log.length > 100) log.shift()
  appState.set('errorLog', log)
}

window.addEventListener('load', bootApp)
</script>
