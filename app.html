<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>SR Platform</title>
<link rel="icon" href="data:,"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
/* ═══════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════ */
:root {
  --bg:          #070B14;
  --bg-surface:  #0A0F1C;
  --bg-elevated: #0F1623;
  --bg-card:     #131929;
  --bg-hover:    #1A2238;
  --bg-active:   #1E2940;

  --border:      rgba(255,255,255,0.05);
  --border-md:   rgba(255,255,255,0.08);
  --border-lg:   rgba(255,255,255,0.12);

  --text-1:      #F0F4FF;
  --text-2:      #8B95B0;
  --text-3:      #4A5268;
  --text-inv:    #070B14;

  --accent:      #3B82F6;
  --accent-dim:  rgba(59,130,246,0.08);
  --accent-glow: rgba(59,130,246,0.15);
  --accent-h:    #2563EB;
  --accent-lg:   #60A5FA;

  --teal:        #14B8A6;
  --teal-dim:    rgba(20,184,166,0.08);
  --green:       #10B981;
  --green-dim:   rgba(16,185,129,0.1);
  --yellow:      #F59E0B;
  --yellow-dim:  rgba(245,158,11,0.1);
  --red:         #EF4444;
  --red-dim:     rgba(239,68,68,0.1);
  --orange:      #F97316;
  --purple:      #8B5CF6;
  --purple-dim:  rgba(139,92,246,0.1);

  --font:        'Plus Jakarta Sans', system-ui, sans-serif;
  --mono:        'JetBrains Mono', 'Courier New', monospace;

  --r-xs:  4px;
  --r-sm:  6px;
  --r:     8px;
  --r-md:  10px;
  --r-lg:  14px;
  --r-xl:  18px;
  --r-2xl: 24px;

  --sidebar-w: 232px;
  --header-h:  60px;

  --ease:    cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in: cubic-bezier(0.4, 0, 1, 1);
  --t:       200ms;
  --t-md:    300ms;
}

/* ═══════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0 }
html { font-size:14px; -webkit-text-size-adjust:100% }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-1);
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  overflow-x: hidden;
}
::selection { background: var(--accent); color: #fff }
::-webkit-scrollbar { width:5px; height:5px }
::-webkit-scrollbar-track { background: transparent }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius:3px }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.18) }
a { color:inherit; text-decoration:none }
button, select, input, textarea { font-family: var(--font) }

/* ═══════════════════════════════════════
   NOISE TEXTURE OVERLAY
═══════════════════════════════════════ */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 1000;
  opacity: 0.4;
}

/* ═══════════════════════════════════════
   AUTH SCREEN
═══════════════════════════════════════ */
#auth-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 20px;
  position: relative;
}
#auth-screen::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 30%, rgba(59,130,246,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 80% at 80% 70%, rgba(20,184,166,0.05) 0%, transparent 60%);
  pointer-events: none;
}
#auth-screen::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 64px 64px;
  pointer-events: none;
}
.auth-wrap {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 400px;
  animation: slideUp 0.5s var(--ease) both;
}
.auth-brand {
  text-align: center;
  margin-bottom: 36px;
}
.auth-logo-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 56px;
  height: 56px;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--accent), var(--teal));
  margin-bottom: 16px;
  box-shadow: 0 0 40px rgba(59,130,246,0.25), 0 0 0 1px rgba(59,130,246,0.2);
}
.auth-brand-name {
  font-size: 1.5rem;
  font-weight: 800;
  letter-spacing: -0.03em;
  background: linear-gradient(135deg, #F0F4FF, #8B95B0);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.auth-brand-sub {
  font-size: 0.7rem;
  color: var(--text-3);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-top: 4px;
}
.auth-card {
  background: var(--bg-card);
  border: 1px solid var(--border-md);
  border-radius: var(--r-xl);
  padding: 28px;
  box-shadow: 0 24px 64px rgba(0,0,0,0.4);
  backdrop-filter: blur(12px);
}
.auth-card h3 {
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 22px;
  color: var(--text-1);
}
.auth-note {
  text-align: center;
  margin-top: 20px;
  font-size: 0.7rem;
  color: var(--text-3);
}

/* ═══════════════════════════════════════
   APP SHELL
═══════════════════════════════════════ */
.app-shell {
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ═══════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════ */
.app-sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: var(--bg-surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
  position: relative;
}
.app-sidebar::after {
  content: '';
  position: absolute;
  top: 0;
  right: 0;
  width: 1px;
  height: 100%;
  background: linear-gradient(to bottom, transparent, rgba(59,130,246,0.15) 30%, rgba(59,130,246,0.15) 70%, transparent);
  pointer-events: none;
}
.sidebar-logo {
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-logo-inner {
  display: flex;
  align-items: center;
  gap: 10px;
}
.sidebar-logo-icon {
  width: 32px;
  height: 32px;
  border-radius: 9px;
  background: linear-gradient(135deg, var(--accent), var(--teal));
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 0 16px rgba(59,130,246,0.3);
}
.sidebar-logo-text { font-weight: 800; font-size: 1rem; letter-spacing: -0.02em }
.sidebar-logo-sub {
  font-size: 0.62rem;
  color: var(--text-3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-top: 1px;
}
.sidebar-nav { padding: 10px 8px; flex: 1 }
.sidebar-section-label {
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-3);
  padding: 10px 10px 5px;
  margin-top: 4px;
}
.sidebar-link {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 10px;
  border-radius: var(--r);
  color: var(--text-2);
  font-size: 0.83rem;
  font-weight: 500;
  transition: all var(--t) var(--ease);
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  position: relative;
  margin-bottom: 1px;
}
.sidebar-link:hover {
  background: var(--bg-hover);
  color: var(--text-1);
}
.sidebar-link.active {
  background: var(--accent-dim);
  color: var(--accent-lg);
  font-weight: 600;
}
.sidebar-link.active::before {
  content: '';
  position: absolute;
  left: 0;
  top: 4px;
  bottom: 4px;
  width: 3px;
  background: var(--accent);
  border-radius: 0 3px 3px 0;
}
.sidebar-link svg { width:15px; height:15px; flex-shrink:0; stroke-width:1.75; opacity:0.7; transition: opacity var(--t) }
.sidebar-link:hover svg, .sidebar-link.active svg { opacity:1 }
.sidebar-footer {
  padding: 10px 8px 14px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-user-info {
  padding: 8px 10px 6px;
  font-size: 0.78rem;
  color: var(--text-2);
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ═══════════════════════════════════════
   MAIN AREA
═══════════════════════════════════════ */
.app-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.app-header {
  height: var(--header-h);
  flex-shrink: 0;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 12px;
}
.breadcrumb {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.78rem;
}
.breadcrumb-sep { color: var(--text-3) }
.breadcrumb-root { color: var(--text-3) }
.breadcrumb-page { font-weight: 600; color: var(--text-1) }
.header-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-status {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.78rem;
  color: var(--text-2);
}
.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  flex-shrink: 0;
}
.page-content {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
}

/* ═══════════════════════════════════════
   TYPOGRAPHY
═══════════════════════════════════════ */
.page-title { font-size: 1.35rem; font-weight: 800; letter-spacing: -0.02em }
.page-subtitle { font-size: 0.78rem; color: var(--text-2); margin-top: 2px }
.section-title { font-size: 0.95rem; font-weight: 700; letter-spacing: -0.01em }
.label-xs {
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-2);
}
.mono { font-family: var(--mono) }
.text-accent { color: var(--accent-lg) }
.text-muted { color: var(--text-2) }
.text-dim { color: var(--text-3) }
.text-green { color: var(--green) }
.text-red { color: var(--red) }
.text-yellow { color: var(--yellow) }

/* ═══════════════════════════════════════
   CARDS
═══════════════════════════════════════ */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 18px;
  transition: border-color var(--t), box-shadow var(--t);
}
.card:hover { border-color: var(--border-md) }
.card-sm { padding: 14px }
.card-lg { padding: 24px }
.card-interactive:hover {
  border-color: var(--border-lg);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  transform: translateY(-1px);
}
.card-interactive { cursor: pointer; transition: all var(--t) var(--ease) }

/* ═══════════════════════════════════════
   STAT CARDS
═══════════════════════════════════════ */
.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
  transition: all var(--t) var(--ease);
}
.stat-card:hover {
  border-color: var(--border-md);
  transform: translateY(-2px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.3);
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--_ac, var(--accent));
  opacity: 0.8;
}
.stat-card::after {
  content: '';
  position: absolute;
  top: 2px;
  right: 0;
  width: 60px;
  height: 60px;
  border-radius: 0 var(--r-lg) 0 60px;
  background: var(--_ac, var(--accent));
  opacity: 0.04;
}
.stat-value {
  font-family: var(--font);
  font-size: 1.9rem;
  font-weight: 800;
  color: var(--_ac, var(--accent-lg));
  line-height: 1;
  letter-spacing: -0.04em;
  margin-bottom: 4px;
}
.stat-label {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-3);
}

/* ═══════════════════════════════════════
   GRID LAYOUTS
═══════════════════════════════════════ */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px }
.grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 14px }
.grid-stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px }

/* ═══════════════════════════════════════
   PAGE HEADER
═══════════════════════════════════════ */
.page-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 22px;
  gap: 16px;
}
.page-header-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  flex-shrink: 0;
  align-items: center;
}

/* ═══════════════════════════════════════
   BUTTONS
═══════════════════════════════════════ */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--r);
  font-size: 0.83rem;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all var(--t) var(--ease);
  white-space: nowrap;
  text-decoration: none;
  line-height: 1;
  position: relative;
  overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0);
  transition: background var(--t);
}
.btn:hover::after { background: rgba(255,255,255,0.04) }
.btn:active { transform: scale(0.97) }
.btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important }

.btn-primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  box-shadow: 0 2px 8px rgba(59,130,246,0.25);
}
.btn-primary:hover:not(:disabled) {
  background: var(--accent-h);
  border-color: var(--accent-h);
  box-shadow: 0 4px 16px rgba(59,130,246,0.35);
  transform: translateY(-1px);
}
.btn-secondary {
  background: var(--bg-elevated);
  color: var(--text-1);
  border-color: var(--border-lg);
}
.btn-secondary:hover:not(:disabled) {
  background: var(--bg-hover);
  border-color: var(--border-lg);
  transform: translateY(-1px);
}
.btn-ghost {
  background: transparent;
  color: var(--text-2);
  border-color: transparent;
}
.btn-ghost:hover:not(:disabled) {
  background: var(--bg-hover);
  color: var(--text-1);
}
.btn-danger {
  background: rgba(239,68,68,0.1);
  color: var(--red);
  border-color: rgba(239,68,68,0.2);
}
.btn-danger:hover:not(:disabled) {
  background: rgba(239,68,68,0.18);
  border-color: rgba(239,68,68,0.35);
}
.btn-success {
  background: rgba(16,185,129,0.1);
  color: var(--green);
  border-color: rgba(16,185,129,0.2);
}
.btn-sm { padding: 5px 10px; font-size: 0.77rem }
.btn-lg { padding: 11px 22px; font-size: 0.95rem }
.btn-icon { padding: 7px; min-width: 32px; justify-content: center }
.btn-icon.btn-sm { padding: 5px; min-width: 26px }
.btn svg { width:13px; height:13px; flex-shrink:0 }

/* Spinner inside button */
.btn-spinner {
  width: 12px;
  height: 12px;
  border: 2px solid rgba(255,255,255,0.25);
  border-top-color: currentColor;
  border-radius: 50%;
  animation: spin 0.65s linear infinite;
  display: inline-block;
}

/* ═══════════════════════════════════════
   FORMS
═══════════════════════════════════════ */
.form-group { display: flex; flex-direction: column; gap: 6px }
.form-label {
  font-size: 0.73rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-2);
}
.form-label.req::after { content: ' *'; color: var(--red); font-weight: 400 }
.form-input, .form-select, .form-textarea {
  background: var(--bg-elevated);
  border: 1px solid var(--border-md);
  border-radius: var(--r);
  padding: 9px 12px;
  font-size: 0.875rem;
  color: var(--text-1);
  width: 100%;
  transition: border-color var(--t), box-shadow var(--t), background var(--t);
  outline: none;
  -webkit-appearance: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
  background: var(--bg-card);
}
.form-input::placeholder, .form-textarea::placeholder { color: var(--text-3) }
.form-textarea { resize: vertical; min-height: 90px; line-height: 1.6 }
.form-select { cursor: pointer }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px }
.form-hint { font-size: 0.73rem; color: var(--text-3); line-height: 1.4 }
.form-error { font-size: 0.73rem; color: var(--red) }

/* Toggle switch */
.toggle-wrap {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-md);
  border-radius: var(--r);
  cursor: pointer;
}
.toggle-wrap:hover { border-color: var(--border-lg) }
.toggle-info { flex: 1 }
.toggle-title { font-size: 0.85rem; font-weight: 600; color: var(--text-1) }
.toggle-desc { font-size: 0.75rem; color: var(--text-2); margin-top: 2px }
.toggle-switch {
  width: 38px;
  height: 22px;
  background: var(--bg-hover);
  border: 1px solid var(--border-lg);
  border-radius: 11px;
  position: relative;
  transition: all var(--t) var(--ease);
  flex-shrink: 0;
  margin-left: 12px;
}
.toggle-switch::after {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  background: var(--text-3);
  border-radius: 50%;
  top: 2px;
  left: 2px;
  transition: all var(--t) var(--ease);
}
.toggle-switch.on {
  background: var(--accent);
  border-color: var(--accent);
}
.toggle-switch.on::after {
  background: #fff;
  transform: translateX(16px);
}

/* ═══════════════════════════════════════
   BADGES
═══════════════════════════════════════ */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 9px;
  border-radius: 20px;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  white-space: nowrap;
  border: 1px solid transparent;
}
.badge-dot { width:5px; height:5px; border-radius:50%; background:currentColor; flex-shrink:0 }
/* Priority */
.badge-low { background:rgba(107,114,128,.1); color:#9CA3AF; border-color:rgba(107,114,128,.18) }
.badge-medium { background:rgba(245,158,11,.1); color:var(--yellow); border-color:rgba(245,158,11,.2) }
.badge-high { background:rgba(239,68,68,.1); color:#F87171; border-color:rgba(239,68,68,.2) }
.badge-critical { background:rgba(239,68,68,.18); color:#FCA5A5; border-color:rgba(239,68,68,.35) }
/* Status */
.badge-open { background:rgba(59,130,246,.1); color:var(--accent-lg); border-color:rgba(59,130,246,.2) }
.badge-in-progress { background:rgba(16,185,129,.1); color:var(--green); border-color:rgba(16,185,129,.2) }
.badge-pending { background:rgba(245,158,11,.1); color:var(--yellow); border-color:rgba(245,158,11,.2) }
.badge-closed { background:rgba(107,114,128,.1); color:#9CA3AF; border-color:rgba(107,114,128,.18) }
.badge-archived { background:rgba(55,65,81,.2); color:#6B7280; border-color:rgba(55,65,81,.3) }
/* Role */
.badge-admin { background:rgba(139,92,246,.1); color:#C084FC; border-color:rgba(139,92,246,.2) }
.badge-manager { background:rgba(16,185,129,.1); color:var(--green); border-color:rgba(16,185,129,.2) }
.badge-technical { background:rgba(59,130,246,.1); color:var(--accent-lg); border-color:rgba(59,130,246,.2) }
.badge-user { background:rgba(255,255,255,.05); color:var(--text-2); border-color:var(--border) }
.badge-viewer { background:rgba(55,65,81,.15); color:#6B7280; border-color:rgba(55,65,81,.25) }
/* Email status */
.badge-sent { background:rgba(16,185,129,.12); color:var(--green); border-color:rgba(16,185,129,.25) }
.badge-failed { background:rgba(239,68,68,.12); color:#EF4444; border-color:rgba(239,68,68,.25) }
.badge-scheduled { background:rgba(59,130,246,.12); color:var(--accent-lg); border-color:rgba(59,130,246,.25) }
.badge-not-sent { background:rgba(107,114,128,.1); color:#6B7280; border-color:rgba(107,114,128,.2) }

/* ═══════════════════════════════════════
   DATA TABLE
═══════════════════════════════════════ */
.table-wrap { overflow-x: auto; border-radius: var(--r-lg); border: 1px solid var(--border) }
.data-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.83rem;
}
.data-table th {
  text-align: left;
  font-size: 0.63rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-3);
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  background: var(--bg-surface);
}
.data-table td {
  padding: 11px 14px;
  border-bottom: 1px solid var(--border);
  color: var(--text-1);
  vertical-align: middle;
}
.data-table tbody tr { transition: background var(--t); cursor: pointer }
.data-table tbody tr:hover { background: var(--bg-hover) }
.data-table tbody tr:last-child td { border-bottom: none }

/* ═══════════════════════════════════════
   TABS
═══════════════════════════════════════ */
.tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}
.tab-btn {
  padding: 10px 16px;
  font-size: 0.83rem;
  font-weight: 500;
  color: var(--text-2);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  cursor: pointer;
  transition: all var(--t);
  font-family: var(--font);
  white-space: nowrap;
}
.tab-btn:hover { color: var(--text-1) }
.tab-btn.active {
  color: var(--accent-lg);
  border-bottom-color: var(--accent);
  font-weight: 600;
}

/* ═══════════════════════════════════════
   ALERTS
═══════════════════════════════════════ */
.alert {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px 14px;
  border-radius: var(--r);
  font-size: 0.83rem;
  border: 1px solid transparent;
  line-height: 1.5;
}
.alert-success { background:rgba(16,185,129,.08); border-color:rgba(16,185,129,.2); color:var(--green) }
.alert-error { background:rgba(239,68,68,.08); border-color:rgba(239,68,68,.2); color:var(--red) }
.alert-warning { background:rgba(245,158,11,.08); border-color:rgba(245,158,11,.2); color:var(--yellow) }
.alert-info { background:rgba(59,130,246,.08); border-color:rgba(59,130,246,.2); color:var(--accent-lg) }

/* ═══════════════════════════════════════
   MODAL
═══════════════════════════════════════ */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(5,8,16,0.7);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  z-index: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 180ms var(--ease);
}
.modal {
  background: var(--bg-card);
  border: 1px solid var(--border-md);
  border-radius: var(--r-xl);
  width: 100%;
  max-width: 580px;
  max-height: 92vh;
  overflow-y: auto;
  animation: slideUp 280ms var(--ease);
  box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04) inset;
}
.modal-lg { max-width: 760px }
.modal-sm { max-width: 420px }
.modal-header {
  padding: 22px 24px 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.modal-title { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.01em }
.modal-body {
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.modal-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
}
.modal-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
}

/* ═══════════════════════════════════════
   FILTER BAR
═══════════════════════════════════════ */
.filter-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.search-wrap { position: relative; flex: 1; min-width: 200px }
.search-wrap svg {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-3);
  pointer-events: none;
  width: 14px;
  height: 14px;
}
.search-wrap input { padding-left: 34px }

/* ═══════════════════════════════════════
   ROUTE PROGRESS
═══════════════════════════════════════ */
.step-dot {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 2px solid var(--border-lg);
  background: var(--bg-elevated);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--text-3);
  flex-shrink: 0;
  transition: all var(--t) var(--ease);
}
.step-dot.done {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 0 12px rgba(59,130,246,0.35);
}
@keyframes pulse-ring {
  0% { box-shadow: 0 0 0 0 rgba(59,130,246,0.4), 0 0 12px rgba(59,130,246,0.2) }
  70% { box-shadow: 0 0 0 8px rgba(59,130,246,0), 0 0 12px rgba(59,130,246,0.2) }
  100% { box-shadow: 0 0 0 0 rgba(59,130,246,0), 0 0 12px rgba(59,130,246,0.2) }
}
.step-dot.current {
  border-color: var(--accent);
  color: var(--accent-lg);
  background: var(--accent-dim);
  animation: pulse-ring 2s cubic-bezier(0.25,0,0,1) infinite;
}
.step-connector { height: 2px; flex: 1; background: var(--border-md); min-width: 20px; border-radius: 1px }
.step-connector.done { background: var(--accent) }

/* ═══════════════════════════════════════
   EMAIL STEP LOG CARD
═══════════════════════════════════════ */
.email-log-card {
  padding: 14px 16px;
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  transition: border-color var(--t);
}
.email-log-card:hover { border-color: var(--border-md) }
.email-log-card.status-sent { border-left: 3px solid var(--green) }
.email-log-card.status-failed { border-left: 3px solid var(--red) }
.email-log-card.status-scheduled { border-left: 3px solid var(--accent) }
.email-log-card.status-not-sent { border-left: 3px solid var(--text-3) }

/* ═══════════════════════════════════════
   EMPTY & ERROR STATES
═══════════════════════════════════════ */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 64px 24px;
  text-align: center;
}
.empty-icon {
  width: 52px;
  height: 52px;
  border-radius: var(--r-lg);
  background: var(--bg-elevated);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-3);
}
.empty-title { font-weight: 700; color: var(--text-2); font-size: 0.95rem }
.empty-desc { font-size: 0.8rem; color: var(--text-3); max-width: 280px; line-height: 1.6 }
.page-error {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 60px 20px;
  text-align: center;
}

/* ═══════════════════════════════════════
   SKELETON LOADER
═══════════════════════════════════════ */
@keyframes shimmer {
  0% { background-position: -600px 0 }
  100% { background-position: 600px 0 }
}
.sk {
  background: linear-gradient(90deg, var(--bg-elevated) 25%, var(--bg-hover) 50%, var(--bg-elevated) 75%);
  background-size: 600px 100%;
  animation: shimmer 1.4s ease infinite;
  border-radius: var(--r);
}
.sk-h { height: 24px; margin-bottom: 4px }
.sk-sm { height: 14px }
.sk-btn { height: 34px; width: 96px; border-radius: var(--r) }
.sk-stat { height: 80px; border-radius: var(--r-lg) }
.sk-row { height: 44px; margin-bottom: 3px; border-radius: var(--r-sm) }
.sk-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; margin-bottom: 20px }

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
#toast-root {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}
.toast {
  pointer-events: all;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  border-radius: var(--r-lg);
  font-size: 0.83rem;
  font-weight: 500;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  animation: slideUpFade 0.22s var(--ease);
  border: 1px solid transparent;
  min-width: 240px;
  max-width: 380px;
  backdrop-filter: blur(12px);
}
.toast-icon { font-size: 0.9rem; flex-shrink: 0 }
.toast-success { background: rgba(10,20,16,0.95); border-color: rgba(16,185,129,0.3); color: var(--green) }
.toast-error { background: rgba(20,10,10,0.95); border-color: rgba(239,68,68,0.3); color: #EF4444 }
.toast-info { background: rgba(10,14,22,0.95); border-color: rgba(59,130,246,0.3); color: var(--accent-lg) }
.toast-warning { background: rgba(20,16,10,0.95); border-color: rgba(245,158,11,0.3); color: var(--yellow) }

/* ═══════════════════════════════════════
   DETAIL ROW
═══════════════════════════════════════ */
.detail-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  gap: 12px;
}
.detail-row:last-child { border-bottom: none }
.detail-label { font-size: 0.78rem; color: var(--text-2); flex-shrink: 0 }
.detail-value { font-size: 0.83rem; font-weight: 500; text-align: right }

/* ═══════════════════════════════════════
   PLACEHOLDER TAGS
═══════════════════════════════════════ */
.placeholder-tag {
  display: inline-flex;
  align-items: center;
  padding: 3px 8px;
  background: var(--accent-dim);
  border: 1px solid rgba(59,130,246,0.2);
  border-radius: var(--r-sm);
  font-size: 0.72rem;
  font-family: var(--mono);
  color: var(--accent-lg);
  cursor: pointer;
  transition: all var(--t);
  user-select: none;
}
.placeholder-tag:hover {
  background: var(--accent-glow);
  border-color: rgba(59,130,246,0.35);
  transform: translateY(-1px);
}

/* ═══════════════════════════════════════
   BAR CHART
═══════════════════════════════════════ */
.bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.bar-label {
  width: 130px;
  font-size: 0.78rem;
  color: var(--text-2);
  text-align: right;
  flex-shrink: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.bar-track {
  flex: 1;
  height: 20px;
  background: var(--bg-elevated);
  border-radius: 4px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--teal));
  border-radius: 4px;
  min-width: 4px;
  transition: width 0.6s var(--ease);
}
.bar-val {
  width: 32px;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--text-1);
  text-align: right;
}

/* ═══════════════════════════════════════
   CODE / MONO BLOCK
═══════════════════════════════════════ */
.code-block {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 10px 12px;
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--accent-lg);
  overflow-x: auto;
}

/* ═══════════════════════════════════════
   UTILITIES
═══════════════════════════════════════ */
.flex { display: flex }
.flex-col { flex-direction: column }
.items-center { align-items: center }
.items-start { align-items: flex-start }
.justify-between { justify-content: space-between }
.justify-center { justify-content: center }
.gap-1 { gap: 4px }
.gap-2 { gap: 8px }
.gap-3 { gap: 12px }
.gap-4 { gap: 16px }
.gap-5 { gap: 20px }
.flex-1 { flex: 1 }
.w-full { width: 100% }
.ml-auto { margin-left: auto }
.mt-auto { margin-top: auto }
.mb-2 { margin-bottom: 8px }
.mb-3 { margin-bottom: 12px }
.mb-4 { margin-bottom: 16px }
.mb-5 { margin-bottom: 20px }
.mt-2 { margin-top: 8px }
.mt-3 { margin-top: 12px }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap }
.hidden { display: none !important }
.divide-y > * + * { border-top: 1px solid var(--border) }

/* ═══════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════ */
@keyframes fadeIn { from { opacity: 0 } to { opacity: 1 } }
@keyframes slideUp {
  from { opacity: 0; transform: translateY(14px) scale(0.98) }
  to { opacity: 1; transform: translateY(0) scale(1) }
}
@keyframes slideUpFade {
  from { opacity: 0; transform: translateY(8px) }
  to { opacity: 1; transform: translateY(0) }
}
@keyframes spin { to { transform: rotate(360deg) } }
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px) }
  to { opacity: 1; transform: translateY(0) }
}
.anim-in { animation: fadeInUp 0.3s var(--ease) both }

/* ═══════════════════════════════════════
   SECTION DIVIDER
═══════════════════════════════════════ */
.section-divider {
  height: 1px;
  background: var(--border);
  margin: 16px 0;
}

/* ═══════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════ */
@media (max-width: 768px) {
  :root { --sidebar-w: 200px }
  .grid-2, .grid-3 { grid-template-columns: 1fr }
  .form-row, .form-row-3 { grid-template-columns: 1fr }
  .page-header { flex-direction: column; align-items: stretch }
  .page-header-actions { flex-wrap: wrap }
}
@media (max-width: 600px) {
  .app-sidebar { display: none }
  .page-content { padding: 16px }
  .app-header { padding: 0 16px }
}
</style>

<div id="modal-root"></div>
<div id="toast-root"></div>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
let CFG = {
  supabaseUrl: null, supabaseAnon: null,
  appsScriptUrl: null, waBridgeUrl: null,
  smtpHost: 'smtpout.secureserver.net', smtpPort: 465,
  srFolderId: null, activitiesFolderId: null,
  srSpreadsheetId: null, srSheetName: 'SR Register', activitySheetName: 'Activity Log',
}

async function initializeConfig() {
  try {
    if (!window.APP_CONFIG) throw new Error('Missing config.js')
    const c = window.APP_CONFIG
    CFG.supabaseUrl   = c.SUPABASE_URL
    CFG.supabaseAnon  = c.SUPABASE_ANON
    CFG.appsScriptUrl = c.APPS_SCRIPT_URL || null
    CFG.waBridgeUrl   = c.WA_BRIDGE_URL || null
    CFG.srFolderId    = c.DRIVE_SR_FOLDER_ID || null
    CFG.activitiesFolderId = c.DRIVE_ACTIVITIES_FOLDER_ID || null
    CFG.srSpreadsheetId    = c.DRIVE_SPREADSHEET_ID || null
    CFG.srSheetName        = c.DRIVE_SR_SHEET_NAME || 'SR Register'
    CFG.activitySheetName  = c.DRIVE_ACTIVITY_SHEET_NAME || 'Activity Log'
    if (!CFG.supabaseUrl || !CFG.supabaseAnon) throw new Error('Missing Supabase config')
    return true
  } catch(e) { console.error('Config error:', e); return false }
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
let sb = null, ME = null

const ISSUE_TYPES = ['Hardware Failure','Software Issue','Network Problem','Access & Permissions','Email Issue','Printer Problem','Installation','Configuration','Performance Issue','Security Concern','Data Recovery','Training Request','Other']
const PRIORITIES  = ['Low','Medium','High','Critical']
const STATUSES    = ['Open','In Progress','Pending','Closed','Archived']
const ROLES       = ['Admin','Manager','Technical','User','Viewer']

function getStoredSession() {
  try {
    const k = Object.keys(localStorage).find(k => k.startsWith('sb-') && k.includes('auth-token'))
    return k ? JSON.parse(localStorage.getItem(k)) : null
  } catch { return null }
}

function withTimeout(p, ms, msg) {
  let t; const to = new Promise((_,r) => { t = setTimeout(() => r(new Error(msg)), ms) })
  return Promise.race([p, to]).finally(() => clearTimeout(t))
}

window.addEventListener('load', async () => {
  try {
    if (!await initializeConfig()) { showAuth(); return }
    const { createClient } = supabase
    sb = createClient(CFG.supabaseUrl, CFG.supabaseAnon, {
      auth: { persistSession:true, autoRefreshToken:true, detectSessionInUrl:true }
    })
    const stored = getStoredSession()
    let sessionUser = stored?.user || null
    if (!sessionUser) {
      const r = await withTimeout(sb.auth.getSession(), 6000, 'Session timeout').catch(() => ({ data:{ session:null } }))
      sessionUser = r.data.session?.user || null
    }
    if (sessionUser) { await loadProfile(sessionUser.id); showApp(); routeFromHash() }
    else showAuth()
    sb.auth.onAuthStateChange(async (event, session) => {
      if (session?.user) { await loadProfile(session.user.id); showApp(); routeFromHash() }
      else if (event === 'SIGNED_OUT') { ME = null; showAuth() }
    })
  } catch(e) { console.error('Boot error:', e); showAuth() }
})
window.addEventListener('hashchange', routeFromHash)

async function loadProfile(uid) {
  try {
    const { data } = await sb.from('users').select('*').eq('id', uid).single()
    ME = data
    if (ME) {
      const name = ME.name ?? ME.email
      document.getElementById('sidebar-user').textContent = name
      document.getElementById('header-user').textContent  = name
      if (!['Admin','Manager'].includes(ME.role)) {
        document.getElementById('admin-section').classList.add('hidden')
        const lbl = document.getElementById('admin-section-label')
        if (lbl) lbl.classList.add('hidden')
      }
    }
    const { data: waSet } = await sb.from('settings').select('value').eq('key','whatsapp').single()
    if (waSet?.value?.bridge_url) CFG.waBridgeUrl = waSet.value.bridge_url
    await auditLog('LOGIN', ME?.id, 'user', 'User logged in', {})
  } catch(e) { console.error('Profile error:', e) }
}

function showAuth() {
  document.getElementById('auth-screen').classList.remove('hidden')
  document.getElementById('app-shell').classList.add('hidden')
}
function showApp() {
  document.getElementById('auth-screen').classList.add('hidden')
  document.getElementById('app-shell').classList.remove('hidden')
}

async function auditLog(action, targetId, targetType, description, meta = {}) {
  try {
    if (!ME) return
    await sb.from('audit_log').insert([{ action, target_id:targetId, target_type:targetType, description, meta, user_id:ME.id }])
  } catch(e) { console.error('Audit log error:', e) }
}

// ═══════════════════════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════════════════════
async function doLogin() {
  const email = document.getElementById('login-email').value.trim()
  const pass  = document.getElementById('login-pass').value
  const btn   = document.getElementById('login-btn')
  const err   = document.getElementById('login-error')
  err.classList.add('hidden')
  btn.disabled = true
  btn.innerHTML = '<span class="btn-spinner"></span> Signing in…'
  try {
    if (!sb) throw new Error('Not initialized. Refresh and try again.')
    const { data, error } = await withTimeout(
      sb.auth.signInWithPassword({ email, password: pass }),
      30000, 'Sign in timed out.'
    )
    if (error) throw error
    const user = data?.user || data?.session?.user
    if (user) { await loadProfile(user.id); showApp(); routeFromHash() }
  } catch(e) {
    err.textContent = e.message.includes('Invalid') ? 'Invalid email or password.' : e.message
    err.classList.remove('hidden')
    btn.disabled = false
    btn.innerHTML = 'Sign In'
  }
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !document.getElementById('auth-screen').classList.contains('hidden')) doLogin()
})

async function doLogout() {
  try {
    sessionStorage.clear()
    Object.keys(localStorage).filter(k => k.startsWith('sb-') && k.includes('auth-token')).forEach(k => localStorage.removeItem(k))
    if (ME) await withTimeout(auditLog('LOGOUT', ME.id, 'user', 'User logged out', {}), 5000, 'Logout audit timeout').catch(()=>{})
    if (sb) await withTimeout(sb.auth.signOut(), 10000, 'Sign out timeout').catch(()=>{})
  } catch(e) { console.error('Logout error:', e) }
  finally { window.location.href = 'login.html' }
}

// ═══════════════════════════════════════════════════════════
// ROUTER
// ═══════════════════════════════════════════════════════════
function nav(page, params = {}) {
  const h = Object.keys(params).length
    ? '#' + page + '?' + new URLSearchParams(params).toString()
    : '#' + page
  window.location.hash = h
}

function routeFromHash() {
  if (!ME) return
  const hash  = window.location.hash.slice(1) || 'dashboard'
  const [page, qs] = hash.split('?')
  const params = Object.fromEntries(new URLSearchParams(qs || ''))

  document.querySelectorAll('.sidebar-link').forEach(l => {
    l.classList.toggle('active', l.getAttribute('onclick')?.includes(`'${page}'`))
  })

  const titles = {
    dashboard:'Dashboard', sr:'Service Requests', 'sr-new':'New SR',
    'sr-detail':'SR Detail', 'sr-edit':'Edit SR', activities:'Activities',
    routes:'Routes', templates:'Templates', whatsapp:'WhatsApp',
    users:'Users', reports:'Reports', settings:'Settings',
  }
  document.getElementById('breadcrumb').textContent = titles[page] ?? page

  const pc = document.getElementById('page-content')
  pc.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:200px;color:var(--text-3);font-size:.85rem">Loading…</div>'

  const pages = {
    dashboard:pgDashboard, sr:pgSR, 'sr-new':pgSRNew,
    'sr-detail':pgSRDetail, 'sr-edit':pgSREdit, activities:pgActivities,
    routes:pgRoutes, templates:pgTemplates, whatsapp:pgWhatsApp,
    users:pgUsers, reports:pgReports, settings:pgSettings
  }
  ;(pages[page] || pgDashboard)(pc, params)
}

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
const fmtDate  = iso => iso ? new Date(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) : '—'
const fmtDateS = iso => iso ? new Date(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'2-digit'}) : '—'
const fmtDT    = iso => iso ? new Date(iso).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—'
const greeting = () => { const h = new Date().getHours(); return h<12?'morning':h<17?'afternoon':'evening' }
const escHtml  = str => String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')

const PRI_CLS  = { Low:'badge-low', Medium:'badge-medium', High:'badge-high', Critical:'badge-critical' }
const STS_CLS  = { 'Open':'badge-open','In Progress':'badge-in-progress','Pending':'badge-pending','Closed':'badge-closed','Archived':'badge-archived' }
const ROLE_CLS = { Admin:'badge-admin', Manager:'badge-manager', Technical:'badge-technical', User:'badge-user', Viewer:'badge-viewer' }

const priBadge  = p => `<span class="badge ${PRI_CLS[p]||'badge-low'}"><span class="badge-dot"></span>${p}</span>`
const stsBadge  = s => `<span class="badge ${STS_CLS[s]||'badge-closed'}">${s}</span>`
const roleBadge = r => `<span class="badge ${ROLE_CLS[r]||'badge-user'}">${r}</span>`

function toast(msg, type = 'success') {
  const root = document.getElementById('toast-root')
  const t = document.createElement('div')
  t.className = `toast toast-${type}`
  const icons = { success:'✓', error:'✕', info:'ℹ', warning:'⚠' }
  t.innerHTML = `<span class="toast-icon">${icons[type]||'ℹ'}</span><span>${escHtml(msg)}</span>`
  root.appendChild(t)
  setTimeout(() => {
    t.style.opacity = '0'; t.style.transform = 'translateY(8px)'; t.style.transition = 'all .25s'
    setTimeout(() => t.remove(), 280)
  }, 3500)
}

function skeletonPage() {
  return `<div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <div class="sk sk-h" style="width:200px"></div>
      <div class="sk sk-btn"></div>
    </div>
    <div class="sk-grid">
      <div class="sk sk-stat"></div><div class="sk sk-stat"></div>
      <div class="sk sk-stat"></div><div class="sk sk-stat"></div>
    </div>
    <div class="card" style="padding:0">
      ${[1,2,3,4,5].map(()=>`<div class="sk sk-row" style="margin:10px 12px;border-radius:6px"></div>`).join('')}
    </div>
  </div>`
}

function pageError(title, msg, canRetry = false, page = '') {
  return `<div class="page-error">
    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="1.5" opacity=".5">
      <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01" stroke-linecap="round"/>
    </svg>
    <div style="font-weight:700;font-size:.95rem">${title}</div>
    <div style="font-size:.78rem;color:var(--text-2);max-width:360px;line-height:1.6">${msg}</div>
    ${canRetry ? `<button class="btn btn-secondary btn-sm" onclick="nav('${page}')">↺ Retry</button>` : ''}
  </div>`
}

function emptyState(title, desc, action = '') {
  return `<div class="empty-state">
    <div class="empty-icon">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/></svg>
    </div>
    <div class="empty-title">${title}</div>
    <div class="empty-desc">${desc}</div>
    ${action}
  </div>`
}

function modal(html, cls = '') {
  document.getElementById('modal-root').innerHTML =
    `<div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal ${cls}" onclick="event.stopPropagation()">${html}</div>
    </div>`
}
function closeModal(e) {
  if (!e || e.target.classList.contains('modal-overlay')) {
    document.getElementById('modal-root').innerHTML = ''
  }
}
function closeModalForce() { document.getElementById('modal-root').innerHTML = '' }

function detailRow(label, value) {
  return `<div class="detail-row">
    <span class="detail-label">${label}</span>
    <span class="detail-value">${value}</span>
  </div>`
}

function statCard(label, value, color) {
  return `<div class="stat-card" style="--_ac:${color}">
    <div class="stat-value">${value}</div>
    <div class="stat-label">${label}</div>
  </div>`
}

// ═══════════════════════════════════════════════════════════
// PAGE: DASHBOARD
// ═══════════════════════════════════════════════════════════
async function pgDashboard(pc) {
  pc.innerHTML = skeletonPage()
  try {
    const [{ data:stats }, { data:recentSRs }, { count:actCount }, { count:overdueCount }] = await Promise.all([
      sb.from('dashboard_stats').select('*').single(),
      sb.from('sr_list').select('*').order('created_at',{ascending:false}).limit(8),
      sb.from('activities').select('*',{count:'exact',head:true}).eq('status','Open'),
      sb.from('sr').select('*',{count:'exact',head:true}).eq('status','Open').lt('reported_at', new Date(Date.now()-48*3600000).toISOString()),
    ])
    const s = stats ?? { total_sr:0,open_sr:0,in_progress_sr:0,pending_sr:0,closed_sr:0,critical_open:0 }

    pc.innerHTML = `
      <div class="page-header">
        <div>
          <div class="page-title">Good ${greeting()}, ${ME?.name?.split(' ')[0]??''} 👋</div>
          <div class="page-subtitle">Here's what's happening across your workflows today</div>
        </div>
        ${ME?.role !== 'Viewer' ? `<div class="page-header-actions">
          <button class="btn btn-primary" onclick="nav('sr-new')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
            New SR
          </button>
        </div>` : ''}
      </div>

      <div class="grid-stats mb-5">
        ${statCard('Total SRs', s.total_sr, 'var(--accent-lg)')}
        ${statCard('Open', s.open_sr, '#60A5FA')}
        ${statCard('In Progress', s.in_progress_sr, 'var(--teal)')}
        ${statCard('Pending', s.pending_sr, 'var(--yellow)')}
        ${statCard('Closed', s.closed_sr, 'var(--text-3)')}
        ${statCard('Critical Open', s.critical_open, 'var(--red)')}
        ${statCard('Overdue 48h', overdueCount??0, 'var(--orange)')}
        ${statCard('Open Activities', actCount??0, 'var(--purple)')}
      </div>

      <div class="card" style="padding:0" id="recent-sr-card">
        <div class="flex items-center justify-between" style="padding:16px 18px;border-bottom:1px solid var(--border)">
          <div>
            <div class="section-title">Recent Service Requests</div>
            <div style="font-size:.73rem;color:var(--text-3);margin-top:2px">Latest 8 records</div>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="nav('sr')">View all →</button>
        </div>
        ${!recentSRs?.length ? emptyState('No service requests yet','Create your first SR to get started',`<button class="btn btn-primary btn-sm" onclick="nav('sr-new')">Create SR</button>`) :
        `<div class="table-wrap" style="border:none;border-radius:0">
          <table class="data-table"><thead><tr>
            <th>SR #</th><th>Title</th><th>Account</th><th>Priority</th><th>Status</th><th>Owner</th><th>Reported</th>
          </tr></thead><tbody>
          ${recentSRs.map(sr=>`<tr onclick="nav('sr-detail',{id:'${sr.id}'})">
            <td><span class="mono text-accent" style="font-size:.73rem;font-weight:700">${escHtml(sr.sr_number)}</span></td>
            <td class="truncate" style="max-width:220px;font-weight:500">${escHtml(sr.title)}</td>
            <td style="color:var(--text-2);font-size:.78rem">${escHtml(sr.account??'—')}</td>
            <td>${priBadge(sr.priority)}</td>
            <td>${stsBadge(sr.status)}</td>
            <td style="font-size:.78rem">${escHtml(sr.owner_name??'—')}</td>
            <td class="mono" style="font-size:.7rem;color:var(--text-3)">${fmtDateS(sr.reported_at)}</td>
          </tr>`).join('')}
          </tbody></table>
        </div>`}
      </div>`
  } catch(e) {
    console.error('Dashboard error:', e)
    pc.innerHTML = pageError('Could not load dashboard', 'Make sure SQL setup files are run in Supabase. Error: '+e.message, true, 'dashboard')
  }
}

// ═══════════════════════════════════════════════════════════
// PAGE: SR LIST
// ═══════════════════════════════════════════════════════════
async function pgSR(pc, params = {}) {
  pc.innerHTML = skeletonPage()
  try {
    const q    = params.q ?? ''
    const sts  = params.status ?? ''
    const pri  = params.priority ?? ''
    const page = parseInt(params.page ?? '1')
    const ps   = 25

    let query = sb.from('sr_list').select('*', {count:'exact'})
    if (sts) query = query.eq('status', sts)
    if (pri) query = query.eq('priority', pri)
    if (q)   query = query.or(`sr_number.ilike.%${q}%,title.ilike.%${q}%,account.ilike.%${q}%,customer_name.ilike.%${q}%`)
    if (!['Admin','Manager'].includes(ME?.role)) query = query.eq('owner_id', ME?.id)

    const { data:srs, count } = await query.order('created_at',{ascending:false}).range((page-1)*ps, page*ps-1)
    const totalPages = Math.ceil((count??0)/ps)

    pc.innerHTML = `
      <div class="page-header">
        <div>
          <div class="page-title">Service Requests</div>
          <div class="page-subtitle">${count??0} total records</div>
        </div>
        ${ME?.role !== 'Viewer' ? `<div class="page-header-actions">
          <button class="btn btn-primary" onclick="nav('sr-new')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
            New SR
          </button>
        </div>` : ''}
      </div>
      <div class="filter-bar">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input class="form-input" id="sr-q" value="${escHtml(q)}" placeholder="Search SR#, title, account…"/>
        </div>
        <select class="form-select" id="sr-sts" style="width:auto">
          <option value="">All Status</option>
          ${STATUSES.map(s=>`<option value="${s}" ${s===sts?'selected':''}>${s}</option>`).join('')}
        </select>
        <select class="form-select" id="sr-pri" style="width:auto">
          <option value="">All Priority</option>
          ${PRIORITIES.map(p=>`<option value="${p}" ${p===pri?'selected':''}>${p}</option>`).join('')}
        </select>
        <button class="btn btn-secondary" onclick="srFilter()">Filter</button>
        <button class="btn btn-ghost" onclick="nav('sr')">Clear</button>
      </div>
      <div class="card" style="padding:0">
        ${!srs?.length ? emptyState('No service requests found','Try adjusting your filters or create a new SR') :
        `<div class="table-wrap" style="border:none;border-radius:0 0 var(--r-lg) var(--r-lg)">
          <table class="data-table"><thead><tr>
            <th>SR #</th><th>Title</th><th>Account</th><th>Issue Type</th><th>Priority</th><th>Status</th><th>Owner</th><th>Reported</th><th>Updated</th>
          </tr></thead><tbody>
          ${srs.map(sr=>`<tr onclick="nav('sr-detail',{id:'${sr.id}'})">

// ─── Advance Modal ────────────────────────────────────────
async function openAdvanceModal(srId, currentStep, totalSteps) {
  const { data:templates } = await sb.from('templates').select('*').eq('type','email').eq('is_active',true).order('name')
  const nextStep = currentStep + 1

  // Check if next step has auto-email configured
  const { data:sr } = await sb.from('sr').select('route_id').eq('id',srId).single()
  let stepAutoEmail = null
  if (sr?.route_id) {
    const { data:step } = await sb.from('route_steps').select('*').eq('route_id',sr.route_id).eq('step_order',nextStep).maybeSingle()
    stepAutoEmail = step?.email_enabled ? step : null
  }

  modal(`
    <div class="modal-header">
      <div class="modal-title">Advance to Step ${nextStep}</div>
      <button class="btn btn-ghost btn-icon btn-sm" onclick="closeModalForce()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      ${stepAutoEmail ? `<div class="alert alert-info">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <span>Automated email is configured for step <strong>"${escHtml(stepAutoEmail.name)}"</strong> and will send automatically.</span>
      </div>` : ''}
      <div>
        <div class="form-label mb-3">Send additional manual email for this step?</div>
        <div class="flex gap-2">
          <button class="btn btn-ghost flex-1" id="adv-yes" style="justify-content:center" onclick="advEmailYes()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            Yes, send email
          </button>
          <button class="btn btn-secondary flex-1" id="adv-no" style="justify-content:center" onclick="advEmailNo()">Skip email</button>
        </div>
      </div>
      <div id="tpl-picker" class="hidden">
        <div class="form-group">
          <label class="form-label">Select Template</label>
          ${!templates?.length
            ? `<div class="alert alert-warning">No active email templates. <button class="btn btn-ghost btn-sm" onclick="nav('templates')">Create one →</button></div>`
            : `<select class="form-select" id="adv-tpl">
                ${templates.map(t=>`<option value="${t.id}">${escHtml(t.name??'')}</option>`).join('')}
               </select>`}
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModalForce()">Cancel</button>
      <button class="btn btn-primary" id="adv-confirm" disabled onclick="confirmAdvance('${srId}',${currentStep},${totalSteps})">
        Advance Step
      </button>
    </div>
  `, 'modal-sm')
}

function advEmailYes() {
  document.getElementById('adv-yes').className = 'btn btn-primary flex-1'
  document.getElementById('adv-yes').style.justifyContent = 'center'
  document.getElementById('adv-no').className = 'btn btn-ghost flex-1'
  document.getElementById('adv-no').style.justifyContent = 'center'
  document.getElementById('tpl-picker').classList.remove('hidden')
  const btn = document.getElementById('adv-confirm')
  btn.disabled = false
  btn.textContent = 'Send Email & Advance'
  btn._emailChoice = 'yes'
}
function advEmailNo() {
  document.getElementById('adv-no').className = 'btn btn-secondary flex-1'
  document.getElementById('adv-no').style.justifyContent = 'center'
  document.getElementById('adv-yes').className = 'btn btn-ghost flex-1'
  document.getElementById('adv-yes').style.justifyContent = 'center'
  document.getElementById('tpl-picker').classList.add('hidden')
  const btn = document.getElementById('adv-confirm')
  btn.disabled = false
  btn.textContent = 'Advance Step'
  btn._emailChoice = 'no'
}

async function confirmAdvance(srId, currentStep, totalSteps) {
  const btn = document.getElementById('adv-confirm')
  const emailChoice = btn._emailChoice
  btn.disabled = true
  btn.innerHTML = '<span class="btn-spinner"></span> Working…'
  const nextStep = currentStep + 1

  try {
    // Manual email if chosen
    if (emailChoice === 'yes') {
      const tplId = document.getElementById('adv-tpl')?.value
      await sendEmailFromBrowser(srId, tplId||null)
    }

    // Trigger automated step email for CURRENT step being completed
    try {
      const { data:srInfo } = await sb.from('sr').select('route_id').eq('id',srId).single()
      if (srInfo?.route_id) {
        const { data:step } = await sb.from('route_steps').select('*').eq('route_id',srInfo.route_id).eq('step_order',currentStep).maybeSingle()
        if (step?.email_enabled) {
          await triggerStepEmail(srId, step.id, false)
        }
      }
    } catch(e) { console.error('Automated step email error:', e) }

    // Advance the step
    await sb.from('sr').update({ current_step:nextStep, status:'In Progress' }).eq('id', srId)
    await sb.from('sr_stage_history').insert({ sr_id:srId, from_step:currentStep, to_step:nextStep, advanced_by:ME.id })
    await auditLog('SR_STAGE_ADVANCE', srId, 'sr', `Advanced to step ${nextStep}`)

    closeModalForce()
    toast(`✓ Step ${nextStep} reached${emailChoice==='yes'?' · Email sent':''}`)
    nav('sr-detail', { id:srId })
  } catch(e) {
    btn.disabled = false
    btn.textContent = emailChoice==='yes'?'Send Email & Advance':'Advance Step'
    btn._emailChoice = emailChoice
    toast('Failed to advance step: '+e.message, 'error')
  }
}

async function doSendEmail(srId) {

// EMAIL ENGINE
// ═══════════════════════════════════════════════════════════
// ── Direct SMTP relay via Supabase Edge Function ──────────
// smtpjs.com removed: it required a SecureToken and its CDN
// was unreliable from the browser. All sends now go through
// the Supabase Edge Function  "send-email"  which runs
// server-side and talks directly to smtpout.secureserver.net.
async function smtpSend({ host, port, username, password, to, from: fromAddr, subject, body }) {
  const { data: { session } } = await sb.auth.getSession()
  const res = await fetch(`${CFG.supabaseUrl}/functions/v1/send-email`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${session?.access_token || CFG.supabaseAnon}`,
    },
    body: JSON.stringify({ host, port, username, password, to, from: fromAddr, subject, body }),
  })
  if (!res.ok) {
    const err = await res.text().catch(() => res.statusText)
    throw new Error(err || 'Edge function error')
  }
  const json = await res.json().catch(() => ({}))
  if (json.error) throw new Error(json.error)
  return 'OK'
}

function replacePlaceholders(str, sr, senderName, extra = {}) {
  if (!str) return ''
  const map = {
    sr_number:         sr.sr_number??'',
    customer_name:     sr.customer_name??'',
    owner_name:        sr.owner_name??'',
    issue_type:        sr.issue_type??'',
    issue_description: sr.issue_description??'',
    status:            sr.status??'',
    priority:          sr.priority??'',
    resolution:        sr.resolution??'',
    company_name:      senderName,
    account:           sr.account??'',
    route_name:        sr.route_name??'',
    name:              extra.name || sr.customer_name || '',
    email:             extra.email || sr.customer_email || '',
    step_name:         extra.step_name || '',
    completion_time:   extra.completion_time || new Date().toLocaleString(),
    company:           extra.company || sr.account || '',
    assigned_user:     extra.assigned_user || sr.owner_name || '',
  }
  return str.replace(/\{\{(\w+)\}\}/g, (_, k) => map[k] ?? '')
}

async function sendEmailFromBrowser(srId, templateId = null, customSubject = null, customBody = null, forcedRecipient = null, extraPlaceholders = {}) {
  const { data:profile } = await sb.from('users').select('smtp_email,smtp_password,name').eq('id', ME.id).single()
  if (!profile?.smtp_email || !profile?.smtp_password) {
    toast('Email credentials not set. Go to Settings → My Email.', 'error')
    return false
  }

  let recipient = null, subject = customSubject, body = customBody

  if (srId) {
    const { data:sr } = await sb.from('sr_list').select('*').eq('id', srId).single()
    if (sr) {
      recipient = forcedRecipient || sr.customer_email
      if (templateId) {
        const { data:tpl } = await sb.from('templates').select('*').eq('id', templateId).single()
        if (tpl) {
          subject = subject || replacePlaceholders(tpl.subject||'', sr, profile.name||profile.smtp_email, extraPlaceholders)
          body    = body    || replacePlaceholders(tpl.body||'', sr, profile.name||profile.smtp_email, extraPlaceholders)
        }
      }
      subject = subject || `Update on Service Request ${sr.sr_number}`
      body    = body    || `Your SR ${sr.sr_number} status is now: ${sr.status}`
    }
  }

  if (!recipient) { toast('No recipient email on this SR', 'error'); return false }

  try {
    await smtpSend({
      host:     CFG.smtpHost,
      port:     CFG.smtpPort,
      username: profile.smtp_email,
      password: profile.smtp_password,
      to:       recipient,
      from:     `${profile.name||profile.smtp_email} <${profile.smtp_email}>`,
      subject,
      body,
    })
    await sb.from('notification_logs').insert({ channel:'email', sr_id:srId, recipient, subject, body, template_id:templateId||null, status:'sent', sent_by:ME.id })
    await auditLog('EMAIL_SENT', srId, 'sr', `Email sent to ${recipient}`)
    return true
  } catch(e) { console.error('Email send error:', e); return false }
}

// ─── Automated Step Email Trigger ────────────────────────
async function triggerStepEmail(srId, stepId, forceSend = false) {
  try {
    const [{ data:step, error:stepErr }, { data:sr, error:srErr }] = await Promise.all([
      sb.from('route_steps').select('*').eq('id', stepId).single(),
      sb.from('sr_list').select('*').eq('id', srId).single(),
    ])
    if (stepErr || !step) { console.error('Step load error:', stepErr); return false }
    if (srErr || !sr)     { console.error('SR load error:', srErr);     return false }

    // Dedup check
    if (!forceSend) {
      const { data:existingLog } = await sb.from('step_email_logs').select('*').eq('sr_id',srId).eq('step_id',stepId).maybeSingle()
      if (existingLog?.status === 'sent') {
        console.log('Email already sent for this step, skipping.')
        return true
      }
    }

    const { data:profile } = await sb.from('users').select('smtp_email,smtp_password,name').eq('id', ME.id).single()
    if (!profile?.smtp_email || !profile?.smtp_password) {
      await upsertEmailLog(srId, stepId, { status:'failed', error_msg:'SMTP credentials not configured', recipient:'(not configured)', subject:'', body:'' })
      return false
    }

    // Resolve recipients
    const recipients = []
    const recTokens  = (step.email_recipients || 'customer').split(',').map(s => s.trim().toLowerCase())
    for (const token of recTokens) {
      if (token === 'customer' && sr.customer_email) { recipients.push(sr.customer_email) }
      else if (token === 'owner' && sr.owner_email)  { recipients.push(sr.owner_email) }
      else if (token === 'creator') {
        const { data:creator } = await sb.from('users').select('email').eq('id', sr.creator_id).single()
        if (creator?.email) recipients.push(creator.email)
      } else if (token.includes('@')) { recipients.push(token) }
    }
    const recipientStr = [...new Set(recipients)].filter(Boolean).join(', ')

    if (!recipientStr) {
      await upsertEmailLog(srId, stepId, { status:'failed', error_msg:'No valid recipient email resolved', recipient:'(none)', subject:'', body:'' })
      return false
    }

    // Resolve subject/body
    let rawSubj = step.email_subject, rawBody = step.email_body
    if (step.email_template && (!rawSubj || !rawBody)) {
      const { data:tpl } = await sb.from('templates').select('*').eq('id', step.email_template).single()
      if (tpl) { rawSubj = rawSubj || tpl.subject; rawBody = rawBody || tpl.body }
    }

    const senderName = profile.name || profile.smtp_email
    const finalSubj  = rawSubj || `Update on Service Request ${sr.sr_number}`
    const finalBody  = rawBody || `Your SR ${sr.sr_number} status is now: ${sr.status}`

    const evalPH = str => {
      if (!str) return ''
      const map = {
        name:             sr.customer_name||'', email:sr.customer_email||'',
        step_name:        step.name||'', route_name:sr.route_name||'',
        completion_time:  new Date().toLocaleString(), company:senderName,
        assigned_user:    sr.owner_name||'', sr_number:sr.sr_number||'',
        customer_name:    sr.customer_name||'', owner_name:sr.owner_name||'',
        issue_type:       sr.issue_type||'', status:sr.status||'',
        priority:         sr.priority||'', resolution:sr.resolution||'—',
        company_name:     senderName, account:sr.account||'',
      }
      return str.replace(/\{\{(\w+)\}\}/g, (_,k) => map[k]??'')
    }

    const subject = evalPH(finalSubj)
    const body    = evalPH(finalBody)

    // Get current log for attempt count
    const { data:currentLog } = await sb.from('step_email_logs').select('*').eq('sr_id',srId).eq('step_id',stepId).maybeSingle()
    const attempts = (currentLog?.attempts||0) + 1

    try {
      await smtpSend({
        host:     CFG.smtpHost,
        port:     CFG.smtpPort,
        username: profile.smtp_email,
        password: profile.smtp_password,
        to:       recipientStr,
        from:     `${senderName} <${profile.smtp_email}>`,
        subject,
        body,
      })
      await upsertEmailLog(srId, stepId, { status:'sent', recipient:recipientStr, subject, body, attempts, sent_at:new Date().toISOString(), error_msg:null }, currentLog?.id)
      await sb.from('notification_logs').insert({ channel:'email', sr_id:srId, recipient:recipientStr, subject, body, template_id:step.email_template||null, status:'sent', sent_by:ME.id })
      await auditLog('EMAIL_SENT', srId, 'sr', `Auto email sent to ${recipientStr} for step "${step.name}"`)
      return true
    } catch(smtpErr) {
      const errMsg = smtpErr.message || 'SMTP exception'
      await upsertEmailLog(srId, stepId, { status:'failed', recipient:recipientStr||'(error)', subject:subject||'', body:body||'', attempts, error_msg:errMsg }, currentLog?.id).catch(()=>{})
      toast(`Auto email error: ${errMsg}`, 'error')
      return false
    }
  } catch(e) {
    console.error('triggerStepEmail error:', e)
    return false
  }
}

async function upsertEmailLog(srId, stepId, logData, existingId = null) {
  const payload = {
    sr_id:           srId,
    step_id:         stepId,
    status:          logData.status,
    recipient:       logData.recipient || '(unknown)',
    subject:         logData.subject || '',
    body:            logData.body || '',
    attempts:        logData.attempts || 1,
    error_msg:       logData.error_msg || null,
    last_attempt_at: new Date().toISOString(),
    ...(logData.sent_at ? { sent_at: logData.sent_at } : {}),
  }
  if (existingId) {
    await sb.from('step_email_logs').update(payload).eq('id', existingId)
  } else {
    await sb.from('step_email_logs').insert(payload)
  }
}

async function pgRoutes(pc) {
  pc.innerHTML = skeletonPage()
  try {
    const { data:routes } = await sb.from('routes').select('*').order('name')
    let selectedRoute = null, selectedSteps = []

    render()

    function render() {
      pc.innerHTML = `
        <div class="page-header">
          <div>
            <div class="page-title">Routes</div>
            <div class="page-subtitle">Manage workflow routes and automation steps</div>
          </div>
          ${['Admin','Manager'].includes(ME?.role) ? `<div class="page-header-actions">
            <button class="btn btn-primary" onclick="openNewRoute()">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
              New Route
            </button>
          </div>` : ''}
        </div>
        <div class="grid-2">
          <div class="card">
            <div class="section-title mb-3">All Routes</div>
            ${!routes?.length ? `<div style="color:var(--text-3);font-size:.83rem;text-align:center;padding:24px 0">No routes yet. Create one to get started.</div>` :
            routes.map(r=>`<div onclick="window.selectRoute('${r.id}')"
              style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:var(--r);cursor:pointer;background:${selectedRoute?.id===r.id?'var(--accent-dim)':'transparent'};margin-bottom:4px;border:1px solid ${selectedRoute?.id===r.id?'rgba(59,130,246,.25)':'transparent'};transition:all var(--t)">
              <div style="min-width:0">
                <div style="font-weight:600;font-size:.85rem">${escHtml(r.name??'')}</div>
                ${r.description?`<div style="font-size:.73rem;color:var(--text-3);margin-top:1px">${escHtml(r.description)}</div>`:''}
              </div>
              <div class="flex items-center gap-2" style="flex-shrink:0;margin-left:10px">
                <span class="badge ${r.is_active?'badge-in-progress':'badge-closed'}">${r.is_active?'Active':'Off'}</span>
                ${['Admin','Manager'].includes(ME?.role) ? `<button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();window.toggleRoute('${r.id}',${r.is_active})">${r.is_active?'Disable':'Enable'}</button>
                <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();window.deleteRoute('${r.id}')">Delete</button>` : ''}
              </div>
            </div>`).join('')}
          </div>
          <div class="card" id="steps-panel">
            ${selectedRoute
              ? `<div class="flex items-center justify-between mb-3">
                  <div>
                    <div class="section-title">${escHtml(selectedRoute.name)}</div>
                    <div style="font-size:.73rem;color:var(--text-3);margin-top:2px">${selectedSteps.length} step${selectedSteps.length!==1?'s':''}</div>
                  </div>
                  ${['Admin','Manager'].includes(ME?.role)?`<button class="btn btn-secondary btn-sm" onclick="openAddStep('${selectedRoute.id}')">+ Add Step</button>`:''}
                </div>
                ${!selectedSteps.length ? `<div style="color:var(--text-3);font-size:.83rem;text-align:center;padding:24px 0">No steps yet. Add a step to this route.</div>` :
                selectedSteps.map((s,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-elevated);border-radius:var(--r);margin-bottom:6px;border:1px solid var(--border)">
                  <div class="step-dot" style="width:22px;height:22px;font-size:.65rem;flex-shrink:0">${s.step_order}</div>
                  <div style="flex:1;min-width:0">
                    <div class="flex items-center gap-2">
                      <div style="font-weight:600;font-size:.83rem">${escHtml(s.name??'')}</div>
                      ${s.email_enabled?`<span class="badge badge-open" style="font-size:.6rem;padding:1px 6px">Email</span>`:''}
                    </div>
                    <div style="font-size:.72rem;color:var(--text-3);margin-top:2px">${escHtml(s.assigned_role??'')} ${s.sla_hours?`· ${s.sla_hours}h SLA`:''}</div>
                  </div>
                  ${['Admin','Manager'].includes(ME?.role)?`<div class="flex gap-1 flex-shrink-0">
                    <button class="btn btn-ghost btn-sm" onclick="openEditStep('${s.id}','${selectedRoute.id}')">Edit</button>
                    <button class="btn btn-ghost btn-sm" onclick="window.moveStep('${s.id}','up','${selectedRoute.id}')" ${i===0?'disabled':''}>↑</button>
                    <button class="btn btn-ghost btn-sm" onclick="window.moveStep('${s.id}','down','${selectedRoute.id}')" ${i===selectedSteps.length-1?'disabled':''}>↓</button>
                    <button class="btn btn-danger btn-sm" onclick="window.deleteStep('${s.id}','${selectedRoute.id}')">✕</button>
                  </div>`:''}
                </div>`).join('')}`
              : `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--text-3);font-size:.83rem;gap:8px">
                  <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" opacity=".4"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3"/></svg>
                  <span>Select a route to see its steps</span>
                </div>`}
          </div>
        </div>`
    }

    window.selectRoute = async (id) => {
      selectedRoute = routes.find(r=>r.id===id)
      const { data } = await sb.from('route_steps').select('*').eq('route_id', id).order('step_order')
      selectedSteps = data ?? []
      render()
    }
    window.toggleRoute = async (id, current) => {
      await sb.from('routes').update({ is_active:!current }).eq('id', id)
      const r = routes.find(r=>r.id===id); if (r) r.is_active = !current
      render()
    }
    window.deleteRoute = async (id) => {
      if (!confirm('Delete this route and all its steps?')) return
      await sb.from('routes').delete().eq('id', id)
      const idx = routes.findIndex(r=>r.id===id); if (idx>-1) routes.splice(idx,1)
      if (selectedRoute?.id===id) { selectedRoute=null; selectedSteps=[] }
      render()
    }
    window.deleteStep = async (stepId, routeId) => {
      if (!confirm('Delete this step?')) return
      await sb.from('route_steps').delete().eq('id', stepId)
      window.selectRoute(routeId)
    }
    window.moveStep = async (stepId, dir, routeId) => {
      const idx = selectedSteps.findIndex(s=>s.id===stepId)
      const target = dir==='up'?idx-1:idx+1
      if (target<0||target>=selectedSteps.length) return
      const a=selectedSteps[idx], b=selectedSteps[target]
      await Promise.all([
        sb.from('route_steps').update({ step_order:b.step_order }).eq('id', a.id),
        sb.from('route_steps').update({ step_order:a.step_order }).eq('id', b.id),
      ])
      window.selectRoute(routeId)
    }
  } catch(e) {
    pc.innerHTML = pageError('Could not load routes', e.message, true, 'routes')
  }
}
