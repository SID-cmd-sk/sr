<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<title>SR Platform</title>
<style>
:root,[data-theme="dark"] { --bg:#060d1a; --card-bg:rgba(18,25,46,.85); --border:rgba(255,255,255,.06); --text-1:#F0F4FF; --text-2:#8B95B0; --accent:#3B82F6; --accent-h:#2563EB }
[data-theme="light"] { --bg:#e8ecf1; --card-bg:rgba(240,243,248,.92); --border:rgba(0,0,0,.08); --text-1:#1a202c; --text-2:#4a5568; --accent:#6366f1; --accent-h:#4f46e5 }
body { margin:0; background:var(--bg); color:var(--text-1); font-family:'Inter',system-ui,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; text-align:center; -webkit-font-smoothing:antialiased }
.card { background:var(--card-bg); border:1px solid var(--border); border-radius:20px; padding:40px; max-width:420px; box-shadow:0 24px 64px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.03) inset; backdrop-filter:blur(24px); animation:fadeInUp .4s ease both }
h2 { margin:0 0 8px; font-family:'Sora',sans-serif; font-size:1.2rem; font-weight:600; letter-spacing:-.02em }
p { color:var(--text-2); font-size:.8rem; margin:0 0 20px; line-height:1.6 }
.btn { display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:8px; font-size:.85rem; font-weight:600; cursor:pointer; background:var(--accent); color:#fff; border:none; text-decoration:none; transition:all .2s ease }
.btn:hover { background:var(--accent-h); transform:translateY(-1px) }
.spinner { width:18px; height:18px; border:2px solid rgba(255,255,255,.2); border-top-color:#fff; border-radius:50%; animation:spin .65s linear infinite; display:inline-block; margin-bottom:20px }
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes fadeInUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@media (max-width:600px) {
  .card { padding:24px 16px; margin:0 10px }
  h2 { font-size:1rem }
  p { font-size:.72rem }
}
</style>
</head><body>
<div class="card" style="animation:fadeInUp .5s ease both">
  <div class="spinner"></div>
  <h2>Redirecting to SR Platform</h2>
  <p>Please wait while we restore your session</p>
</div>
<script>
;(function() {
  document.addEventListener('contextmenu', e => e.preventDefault())
  document.addEventListener('keydown', e => {
    if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key)) || (e.ctrlKey && e.key === 'U')) e.preventDefault()
  })
  const t = localStorage.getItem('sr-theme') || 'dark'
  document.documentElement.setAttribute('data-theme', t)
})()
;(async function() {
  const fullPath = window.location.pathname + window.location.search
  const basePath = (window.location.pathname.match(/(.*?)\/app(\.html|\/)/)?.[1]) || ''
  const pathAfterBase = basePath ? fullPath.slice(basePath.length) : fullPath
  const qIdx = pathAfterBase.indexOf('?')
  const routePath = qIdx === -1 ? pathAfterBase : pathAfterBase.substring(0, qIdx)
  const searchParams = qIdx === -1 ? {} : Object.fromEntries(new URLSearchParams(pathAfterBase.substring(qIdx)))
  const routeMap = {'/app/dashboard':'dashboard','/app/sr':'sr','/app/sr-new':'sr-new','/app/sr-detail':'sr-detail','/app/sr-edit':'sr-edit','/app/activities':'activities','/app/templates':'templates','/app/routes':'routes','/app/whatsapp':'whatsapp','/app/users':'users','/app/reports':'reports','/app/settings':'settings','/app/create':'create'}
  let page = 'dashboard'
  for (const [rp, p] of Object.entries(routeMap)) { if (routePath === rp) { page = p; break } }
  sessionStorage.setItem('sr_restore', JSON.stringify({ page, params: searchParams }))
  try {
    if (window.APP_CONFIG && window.APP_CONFIG.SUPABASE_URL) {
      const { createClient } = window.supabase
      const sb = createClient(APP_CONFIG.SUPABASE_URL, APP_CONFIG.SUPABASE_ANON, {
        auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
      })
      const { data } = await sb.auth.getSession()
      if (data.session) {
        window.location.href = basePath + '/app.html'
        return
      }
    }
  } catch(e) {}
  window.location.href = basePath + '/login.html'
})()
</script>
</body></html>
